<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>해와 달이 된 오누이(AI)</title>
    <style>
        /* 1. 기본 초기화 및 스크롤 차단 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background-color: #000;
        }

        /* 슬라이더 전체 컨테이너 (화면 한 개 크기) */
        .slider-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            touch-action: pan-y; /* 스와이프 시 브라우저 기본 동작 방해 최소화 */
        }

        /* 20장의 이미지가 가로로 배치될 띠 */
        .slider-wrapper {
            display: flex;
            height: 100%;
            /* 자바스크립트에서 슬라이드 개수에 따라 폭이 자동 계산됩니다 */
            transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* 개별 슬라이드 설정 */
        .slide {
            width: 100vw; /* 무조건 화면 너비만큼 점유 */
            height: 100vh;
            flex-shrink: 0; /* 중요: 이미지가 많아도 크기가 줄어들지 않음 */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 이미지 박스: 세로(1426px) 기준으로 꽉 채우기 */
        .image-box {
            width: 100%;
            height: 100%;
            /* contain: 세로가 잘리지 않고 다 보임 / cover: 여백없이 꽉 채움 */
            /* 사용자의 의도에 따라 contain을 사용하면 1426px 전체가 다 보입니다. */
            background-size: contain; 
            background-position: center center;
            background-repeat: no-repeat;
        }

        /* PC용 네비게이션 버튼 */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: none;
            width: 60px;
            height: 100px;
            cursor: pointer;
            z-index: 100;
            font-size: 40px;
            transition: 0.3s;
        }
        .nav-btn:hover { background: rgba(255, 255, 255, 0.3); }
        .prev { left: 0; }
        .next { right: 0; }

        /* 모바일에서는 화살표 숨기기 */
        @media (max-width: 768px) {
            .nav-btn { display: none; }
        }
    </style>
</head>
<body>

    <div class="slider-container">
        <div class="slider-wrapper" id="sliderWrapper">
            <div class="slide"><div class="image-box" style="background-image: url('./images/slide/AI_000.png')"></div></div>
            <div class="slide"><div class="image-box" style="background-image: url('./images/slide/AI_001.png')"></div></div>
            <div class="slide"><div class="image-box" style="background-image: url('./images/slide/AI_002.png')"></div></div>
            <div class="slide"><div class="image-box" style="background-image: url('./images/slide/AI_003.png')"></div></div>
            <div class="slide"><div class="image-box" style="background-image: url('./images/slide/AI_004.png')"></div></div>
            <div class="slide"><div class="image-box" style="background-image: url('./images/slide/AI_005.png')"></div></div>
            <div class="slide"><div class="image-box" style="background-image: url('./images/slide/AI_006.png')"></div></div>
            <div class="slide"><div class="image-box" style="background-image: url('./images/slide/AI_007.png')"></div></div>
            <div class="slide"><div class="image-box" style="background-image: url('./images/slide/AI_008.png')"></div></div>
            <div class="slide"><div class="image-box" style="background-image: url('./images/slide/AI_009.png')"></div></div>
            <div class="slide"><div class="image-box" style="background-image: url('./images/slide/AI_010.png')"></div></div>
            <div class="slide"><div class="image-box" style="background-image: url('./images/slide/AI_011.png')"></div></div>
            <div class="slide"><div class="image-box" style="background-image: url('./images/slide/AI_012.png')"></div></div>
            <div class="slide"><div class="image-box" style="background-image: url('./images/slide/AI_013.png')"></div></div>
        </div>

        <button class="nav-btn prev" id="prevBtn">&#10094;</button>
        <button class="nav-btn next" id="nextBtn">&#10095;</button>
    </div>

    <script>
        const wrapper = document.getElementById('sliderWrapper');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        const slides = document.querySelectorAll('.slide');

        let currentIndex = 0;
        const totalSlides = slides.length;

        // wrapper의 전체 너비를 슬라이드 개수에 맞춰 자동 설정 (2000%)
        wrapper.style.width = `${totalSlides * 100}%`;

        function updateSlider() {
            // 정확히 인덱스만큼 화면 너비(100vw)를 이동
            wrapper.style.transform = `translateX(-${currentIndex * 100}vw)`;
        }

        // 버튼 클릭 이벤트 (PC)
        nextBtn.addEventListener('click', () => {
            if (currentIndex < totalSlides - 1) {
                currentIndex++;
                updateSlider();
            }
        });

        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                updateSlider();
            }
        });

        // 스와이프 기능 (PC & 모바일 공통)
        let startX = 0;
        let isDragging = false;

        const touchStart = (e) => {
            startX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
            isDragging = true;
        };

        const touchEnd = (e) => {
            if (!isDragging) return;
            const endX = e.type.includes('mouse') ? e.pageX : e.changedTouches[0].clientX;
            const diff = startX - endX;

            if (Math.abs(diff) > 50) { // 50px 이상 움직였을 때
                if (diff > 0 && currentIndex < totalSlides - 1) currentIndex++;
                else if (diff < 0 && currentIndex > 0) currentIndex--;
            }
            
            updateSlider();
            isDragging = false;
        };

        // 터치 이벤트 (모바일)
        wrapper.addEventListener('touchstart', touchStart, { passive: true });
        wrapper.addEventListener('touchend', touchEnd, { passive: true });

        // 마우스 스와이프 이벤트 (PC에서도 드래그로 넘기기 가능)
        wrapper.addEventListener('mousedown', touchStart);
        wrapper.addEventListener('mouseup', touchEnd);
        wrapper.addEventListener('mouseleave', () => isDragging = false);

        // 창 크기 조절 시 위치 보정
        window.addEventListener('resize', updateSlider);
    </script>
</body>
</html>
