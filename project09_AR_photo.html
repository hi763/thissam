<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>모바일 AR 카메라</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden;
            font-family: sans-serif; background: #000; color: white; 
            display: flex; flex-direction: column; align-items: center;
        }
        .container { 
            position: relative; width: 100vw; height: 80vh; 
            display: flex; justify-content: center; align-items: center;
        }
        canvas { 
            max-width: 100%; max-height: 100%; 
            transform: scaleX(-1); /* 셀카 모드 좌우 반전 */
            object-fit: contain;
        }
        video { display: none; }
        .controls { 
            width: 100%; height: 20vh; background: rgba(34, 34, 34, 0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            gap: 10px; z-index: 10;
        }
        .btn-group { display: flex; gap: 15px; }
        button, label { 
            padding: 12px 20px; font-size: 14px; font-weight: bold;
            cursor: pointer; background: #ff4757; color: white; 
            border: none; border-radius: 25px; touch-action: manipulation;
        }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div class="controls">
        <div class="btn-group">
            <label for="bgInput">🖼️ 배경 변경</label>
            <input type="file" id="bgInput" accept="image/*">
            <button id="captureBtn">📸 사진 찍기</button>
        </div>
        <p style="font-size: 12px; color: #aaa;">카메라가 안 나오면 '새로고침' 후 '허용'을 눌러주세요.</p>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const bgInput = document.getElementById('bgInput');
        const captureBtn = document.getElementById('captureBtn');

        let customBgImage = new Image();
        customBgImage.crossOrigin = "anonymous";
        customBgImage.src = 'https://hi763.github.io/thissam/imgaes/AR_photo.pnt?w=1280'; 

        bgInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => { customBgImage.src = event.target.result; };
                reader.readAsDataURL(file);
            }
        };

        const selfieSegmentation = new SelfieSegmentation({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`;
        }});

        // 모바일 성능을 위해 modelSelection을 0(가벼운 모델)으로 설정
        selfieSegmentation.setOptions({ modelSelection: 0 });

        selfieSegmentation.onResults((results) => {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            // 1. 마스크 영역 추출
            canvasCtx.drawImage(results.segmentationMask, 0, 0, canvasElement.width, canvasElement.height);

            // 2. 사람만 그리기
            canvasCtx.globalCompositeOperation = 'source-in';
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            // 3. 배경 이미지 합성 (사람 뒤에)
            canvasCtx.globalCompositeOperation = 'destination-over';
            canvasCtx.drawImage(customBgImage, 0, 0, canvasElement.width, canvasElement.height);

            canvasCtx.restore();
        });

        captureBtn.addEventListener('click', () => {
            const dataUrl = canvasElement.toDataURL("image/png");
            const link = document.createElement('a');
            link.download = `AR_Selfie_${Date.now()}.png`;
            link.href = dataUrl;
            link.click();
            alert("사진이 저장되었습니다!");
        });

        async function startApp() {
            try {
                const camera = new Camera(videoElement, {
                    onFrame: async () => {
                        await selfieSegmentation.send({image: videoElement});
                    },
                    // 전면 카메라 강제 설정 및 모바일 해상도 최적화
                    width: { ideal: 640 },
                    height: { ideal: 480 },
                    facingMode: 'user'
                });
                await camera.start();
            } catch (err) {
                console.error("Mobile Camera Error:", err);
                alert("카메라를 실행할 수 없습니다. 브라우저 설정에서 카메라 권한을 확인해주세요.");
            }
        }

        // 페이지 로드 후 실행
        window.onload = startApp;
    </script>
</body>
</html>
