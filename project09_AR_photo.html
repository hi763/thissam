<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>초경량 AR 카메라</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #111; }
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
        .mirror { transform: scaleX(-1); }
        video { display: none; }
        
        /* 촬영 버튼 바 */
        .controls { height: 100px; background: #141414; display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
        button, .file-label { width: 55px; height: 55px; background: #333; border-radius: 50%; border: 1px solid #444; color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        #captureBtn { width: 70px; height: 70px; background: #fff; border: 5px solid #ff4757; }
        
        /* 촬영 결과 미리보기 팝업 */
        #previewOverlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; 
        }
        #previewImg { max-width: 80%; max-height: 70%; border: 2px solid white; margin-bottom: 20px; }
        .preview-btns { display: flex; gap: 20px; }
        .p-btn { padding: 10px 20px; border-radius: 5px; border: none; font-weight: bold; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <video id="input_video" playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div id="previewOverlay">
        <p>사진을 길게 눌러 저장하거나 아래 버튼을 누르세요</p>
        <img id="previewImg" src="">
        <div class="preview-btns">
            <button class="p-btn" style="background:#555; color:white;" onclick="closePreview()">다시 찍기</button>
            <button id="saveLink" class="p-btn" style="background:#ff4757; color:white;">저장하기</button>
        </div>
    </div>

    <div class="controls">
        <label for="bgInput" class="file-label">🖼️</label>
        <input type="file" id="bgInput" accept="image/*">
        <button id="captureBtn">📸</button>
        <button id="switchBtn">🔄</button>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const previewOverlay = document.getElementById('previewOverlay');
        const previewImg = document.getElementById('previewImg');
        const saveLink = document.getElementById('saveLink');

        let currentFacingMode = 'user';
        let camera = null;
        let customBgImage = new Image();
        customBgImage.crossOrigin = "anonymous";
        customBgImage.src = 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=800';

        const selfieSegmentation = new SelfieSegmentation({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`;
        }});

        // 모바일 멈춤 방지: 가장 가벼운 설정
        selfieSegmentation.setOptions({ modelSelection: 0, selfSmoothing: true });

        selfieSegmentation.onResults((results) => {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.segmentationMask, 0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.globalCompositeOperation = 'source-in';
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.globalCompositeOperation = 'destination-over';
            
            // 배경 Cover 로직
            const cw = canvasElement.width; const ch = canvasElement.height;
            const iw = customBgImage.width; const ih = customBgImage.height;
            const canvasAspect = cw / ch; const imgAspect = iw / ih;
            let sx, sy, sw, sh;
            if (imgAspect > canvasAspect) { sw = ih * canvasAspect; sh = ih; sx = (iw - sw) / 2; sy = 0; }
            else { sw = iw; sh = iw / canvasAspect; sx = 0; sy = (ih - sh) / 2; }
            canvasCtx.drawImage(customBgImage, sx, sy, sw, sh, 0, 0, cw, ch);
            canvasCtx.restore();
        });

        async function startApp() {
            if (camera) { await camera.stop(); }
            canvasElement.className = (currentFacingMode === 'user') ? 'mirror' : '';
            camera = new Camera(videoElement, {
                onFrame: async () => { await selfieSegmentation.send({image: videoElement}); },
                width: 480, height: 360, // 성능을 위해 해상도 더 낮춤
                facingMode: currentFacingMode
            });
            camera.start();
        }

        // 촬영 로직 수정
        document.getElementById('captureBtn').onclick = () => {
            const dataUrl = canvasElement.toDataURL("image/png");
            previewImg.src = dataUrl;
            previewOverlay.style.display = 'flex';
            
            // 저장 버튼 동작 설정
            saveLink.onclick = () => {
                const a = document.createElement('a');
                a.href = dataUrl;
                a.download = `AR_Snap_${Date.now()}.png`;
                a.click();
                alert("다운로드를 시도합니다. 반응이 없다면 사진을 길게 눌러주세요!");
            };
        };

        function closePreview() { previewOverlay.style.display = 'none'; }

        document.getElementById('switchBtn').onclick = () => {
            currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
            startApp();
        };

        document.getElementById('bgInput').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => { customBgImage.src = ev.target.result; };
                reader.readAsDataURL(file);
            }
        };

        window.onload = startApp;
    </script>
</body>
</html>
