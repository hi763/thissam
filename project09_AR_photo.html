<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>모바일 AR 카메라 - 디버깅</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        :root { --controls-height: 100px; }
        body { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; background: #000; color: white; display: flex; flex-direction: column; height: 100vh; }
        .container { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: #111; overflow: hidden; }
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
        .mirror { transform: scaleX(-1); }
        video { display: none; }
        .controls { height: var(--controls-height); background: #141414; display: flex; justify-content: space-around; align-items: center; padding: env(safe-area-inset-bottom) 15px; border-top: 1px solid #333; }
        button, .file-label { width: 55px; height: 55px; font-size: 18px; cursor: pointer; background: #333; color: white; border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        #captureBtn { width: 65px; height: 65px; background: white; border: 4px solid #ff4757; }
        #debug-msg { position: absolute; top: 10px; left: 10px; font-size: 12px; color: #ff4757; background: rgba(0,0,0,0.7); z-index: 1000; pointer-events: none; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div id="debug-msg">상태: 라이브러리 로딩 중...</div>

    <div class="container">
        <video id="input_video" playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div class="controls">
        <label for="bgInput" class="file-label">🖼️</label>
        <input type="file" id="bgInput" accept="image/*">
        <button id="captureBtn">📸</button>
        <button id="switchBtn">🔄</button>
    </div>

    <script>
        const debug = document.getElementById('debug-msg');
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const bgInput = document.getElementById('bgInput');
        const captureBtn = document.getElementById('captureBtn');
        const switchBtn = document.getElementById('switchBtn');

        let currentFacingMode = 'user';
        let camera = null;
        let customBgImage = new Image();
        customBgImage.crossOrigin = "anonymous";
        customBgImage.src = 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=800'; 

        bgInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => { customBgImage.src = event.target.result; };
                reader.readAsDataURL(file);
            }
        };

        const selfieSegmentation = new SelfieSegmentation({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`;
        }});
        selfieSegmentation.setOptions({ modelSelection: 0 });

        selfieSegmentation.onResults((results) => {
            debug.innerText = "상태: 실시간 합성 중";
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.segmentationMask, 0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.globalCompositeOperation = 'source-in';
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.globalCompositeOperation = 'destination-over';
            canvasCtx.drawImage(customBgImage, 0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.restore();
        });

        async function startCamera() {
            try {
                debug.innerText = "상태: 카메라 권한 요청 중...";
                if (camera) { await camera.stop(); }
                
                canvasElement.className = (currentFacingMode === 'user') ? 'mirror' : '';
                
                camera = new Camera(videoElement, {
                    onFrame: async () => { await selfieSegmentation.send({image: videoElement}); },
                    width: { ideal: 640 },
                    height: { ideal: 480 },
                    facingMode: currentFacingMode
                });

                await camera.start();
                debug.innerText = "상태: 카메라 시작 성공!";
            } catch (err) {
                debug.innerText = "에러: " + err.name + " - " + err.message;
                console.error(err);
                if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
                    debug.innerText += "\n[중요] HTTPS 환경이 아닙니다!";
                }
            }
        }

        switchBtn.onclick = () => {
            currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
            startCamera();
        };

        captureBtn.onclick = () => {
            const dataUrl = canvasElement.toDataURL("image/png");
            const link = document.createElement('a');
            link.download = `AR_Snap_${Date.now()}.png`;
            link.href = dataUrl;
            link.click();
        };

        window.onload = startCamera;
    </script>
</body>
</html>
