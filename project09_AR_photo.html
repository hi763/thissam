<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>최종 완성 AR 카메라</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        body { margin: 0; background: #000; color: white; height: 100vh; display: flex; flex-direction: column; font-family: sans-serif; overflow: hidden; }
        #container { flex: 1; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
        .mirror { transform: scaleX(-1); }
        video { display: none; }
        
        /* 버튼 바 */
        .controls { height: 90px; background: #111; display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); border-top: 1px solid #333; }
        button, .file-label { width: 50px; height: 50px; border-radius: 50%; border: 1px solid #444; background: #222; color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; outline: none; }
        #captureBtn { width: 65px; height: 65px; background: #ff4757; border: 4px solid white; font-size: 24px; }

        /* 미리보기 팝업 보정 */
        #resultView { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center;
        }
        #resultImg { max-width: 85%; max-height: 65%; border: 2px solid #fff; object-fit: contain; }
        .p-msg { margin: 15px; font-size: 14px; text-align: center; color: #ccc; line-height: 1.4; }
        #closeBtn { padding: 12px 25px; border-radius: 25px; background: #fff; color: #000; border: none; font-weight: bold; font-size: 15px; cursor: pointer; }
        
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div id="container">
        <video id="input_video" playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div id="resultView">
        <div class="p-msg">사진을 <b>길게 눌러서</b> 저장하세요!</div>
        <img id="resultImg" src="">
        <button id="closeBtn" onclick="closeResult()">다시 찍기</button>
    </div>

    <div class="controls">
        <label for="bgInput" class="file-label">🖼️</label>
        <input type="file" id="bgInput" accept="image/*">
        <button id="captureBtn">📸</button>
        <button id="switchBtn">🔄</button>
    </div>

    <script>
        const video = document.getElementById('input_video');
        const canvas = document.getElementById('output_canvas');
        const ctx = canvas.getContext('2d');
        const resultView = document.getElementById('resultView');
        const resultImg = document.getElementById('resultImg');

        let currentMode = 'user';
        let camera = null;
        let bg = new Image();
        bg.crossOrigin = "anonymous";
        bg.src = 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=800';

        const segmenter = new SelfieSegmentation({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`});
        segmenter.setOptions({ modelSelection: 0 });

        segmenter.onResults((results) => {
            if (!results.image) return;
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(results.segmentationMask, 0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'source-in';
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'destination-over';
            
            // 배경 Cover 로직 (가로세로 회전 완벽 대응)
            const cw = canvas.width, ch = canvas.height;
            const iw = bg.width, ih = bg.height;
            const cRatio = cw / ch, iRatio = iw / ih;
            let sx, sy, sw, sh;
            if (iRatio > cRatio) { sw = ih * cRatio; sh = ih; sx = (iw - sw) / 2; sy = 0; }
            else { sw = iw; sh = iw / cRatio; sx = 0; sy = (ih - sh) / 2; }
            ctx.drawImage(bg, sx, sy, sw, sh, 0, 0, cw, ch);
            ctx.restore();
        });

        async function startApp() {
            // 1. 기존 카메라 인스턴스 완전 종료 (가장 중요)
            if (camera) {
                await camera.stop();
                const tracks = video.srcObject ? video.srcObject.getTracks() : [];
                tracks.forEach(track => track.stop());
                video.srcObject = null;
            }

            canvas.className = (currentMode === 'user') ? 'mirror' : '';
            
            // 2. 새로운 설정으로 카메라 시작
            camera = new Camera(video, {
                onFrame: async () => { await segmenter.send({image: video}); },
                width: 640, height: 480, // 안정성을 위한 중간 해상도
                facingMode: currentMode
            });
            
            try {
                await camera.start();
            } catch (err) {
                alert("카메라 전환에 실패했습니다. 페이지를 새로고침 해주세요.");
            }
        }

        document.getElementById('captureBtn').onclick = () => {
            resultImg.src = canvas.toDataURL("image/png");
            resultView.style.display = 'flex';
        };

        function closeResult() { resultView.style.display = 'none'; }

        // 전환 버튼: 비동기 처리 보완
        document.getElementById('switchBtn').onclick = async () => {
            currentMode = (currentMode === 'user') ? 'environment' : 'user';
            await startApp();
        };

        document.getElementById('bgInput').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => { bg.src = ev.target.result; };
                reader.readAsDataURL(file);
            }
        };

        window.onload = startApp;
    </script>
</body>
</html>
