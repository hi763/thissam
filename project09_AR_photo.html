<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>반응형 AR 카메라</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        :root {
            --controls-height: 100px;
        }

        body { 
            margin: 0; padding: 0; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #000; color: white; 
            display: flex; flex-direction: column;
            height: 100vh; /* 전체 화면 높이 고정 */
        }

        /* 카메라 컨테이너: 남은 모든 공간 차지 */
        .container { 
            flex: 1;
            position: relative; 
            display: flex; justify-content: center; align-items: center;
            background: #111;
            overflow: hidden;
        }

        canvas { 
            max-width: 100%; max-height: 100%;
            object-fit: contain;
        }

        .mirror { transform: scaleX(-1); }
        video { display: none; }

        /* 하단 컨트롤 영역: 하단에 딱 붙어서 버튼 보호 */
        .controls { 
            height: var(--controls-height);
            background: rgba(20, 20, 20, 0.95);
            display: flex; justify-content: space-around; align-items: center;
            padding: env(safe-area-inset-bottom) 15px; /* 아이폰 하단 바 영역 보호 */
            box-sizing: border-box;
            border-top: 1px solid #333;
        }

        /* 가로 모드일 때 레이아웃 최적화 */
        @media (orientation: landscape) {
            :root { --controls-height: 70px; }
            .controls { padding: 0 20px; }
        }

        .btn-wrapper {
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }

        button, .file-label { 
            display: flex; align-items: center; justify-content: center;
            width: 60px; height: 60px;
            font-size: 20px; cursor: pointer; 
            background: #333; color: white; 
            border: none; border-radius: 50%;
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        button:active { transform: scale(0.9); }

        #captureBtn { 
            width: 70px; height: 70px;
            background: white; color: black; 
            border: 4px solid #ff4757;
            font-size: 24px;
        }

        .btn-text { font-size: 10px; color: #aaa; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div class="controls">
        <div class="btn-wrapper">
            <label for="bgInput" class="file-label">🖼️</label>
            <input type="file" id="bgInput" accept="image/*">
            <span class="btn-text">배경</span>
        </div>
        
        <div class="btn-wrapper">
            <button id="captureBtn">📸</button>
            <span class="btn-text">촬영</span>
        </div>
        
        <div class="btn-wrapper">
            <button id="switchBtn">🔄</button>
            <span class="btn-text">전환</span>
        </div>
    </div>
