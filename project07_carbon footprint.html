<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>탄소 발자국 계산기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Pretendard', sans-serif; }
        .container { max-width: 800px; margin-top: 50px; }
        .result-card { display: none; }
        /* 버튼 공통 텍스트 굵기 조절 */
        .btn-custom { font-weight: bold; }
        #resetBtn { display: none; } 
    </style>
</head>
<body>

<div class="container">
    <div class="p-5 mb-4 bg-light rounded-3 shadow-sm text-center">
        <h1 class="display-5 fw-bold text-success">🌱 탄소 발자국 계산기</h1>
        <p class="fs-5">나의 일상 활동이 지구에 미치는 영향을 계산해 보세요.</p>
    </div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card h-100 p-4 shadow-sm">
                <h3 class="mb-4">활동 데이터 입력</h3>
                <div class="mb-3">
                    <label class="form-label fw-bold">전기 사용량 (kWh)</label>
                    <input type="number" id="elec" class="form-control form-control-lg" placeholder="예: 50">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">자동차 주행 거리 (km)</label>
                    <input type="number" id="car" class="form-control form-control-lg" placeholder="예: 10">
                </div>
                
                <div class="mt-4">
                    <button onclick="calculateCarbon()" id="calcBtn" class="btn btn-success btn-lg w-100 btn-custom">
                        계산하기
                    </button>
                    <button onclick="resetAll()" id="resetBtn" class="btn btn-warning btn-lg w-100 btn-custom text-white">
                        다시 하기
                    </button>
                </div>
            </div>
        </div>

        <div class="col-md-6 result-card" id="resultSection">
            <div class="card h-100 p-4 text-center shadow-sm border-success">
                <h3 class="mb-3">나의 탄소 배출량</h3>
                <h2 class="text-danger display-6 fw-bold mb-4"><span id="totalRes">0</span> kg CO₂</h2>
                <div style="max-width: 250px; margin: 0 auto;">
                    <canvas id="carbonChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let chart;

    function calculateCarbon() {
        const elecFactor = 0.47; 
        const carFactor = 0.21;  

        const elecValue = document.getElementById('elec').value || 0;
        const carValue = document.getElementById('car').value || 0;

        if (elecValue == 0 && carValue == 0) {
            alert("수치를 입력해 주세요!");
            return;
        }

        const elecResult = elecValue * elecFactor;
        const carResult = carValue * carFactor;
        const total = (elecResult + carResult).toFixed(2);

        document.getElementById('totalRes').innerText = total;
        document.getElementById('resultSection').style.display = 'block';
        
        // 버튼 교체
        document.getElementById('calcBtn').style.display = 'none';
        document.getElementById('resetBtn').style.display = 'block';

        updateChart(elecResult, carResult);
    }

    function updateChart(e, c) {
        const ctx = document.getElementById('carbonChart').getContext('2d');
        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['전기', '교통'],
                datasets: [{
                    data: [e, c],
                    backgroundColor: ['#ffcd56', '#ff6384'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });
    }

    function resetAll() {
        document.getElementById('elec').value = '';
        document.getElementById('car').value = '';
        document.getElementById('resultSection').style.display = 'none';
        
        // 버튼 원복
        document.getElementById('calcBtn').style.display = 'block';
        document.getElementById('resetBtn').style.display = 'none';
        
        if (chart) chart.destroy();
    }
</script>

</body>
</html>
