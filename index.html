  <style>
    html { scroll-behavior: smooth; scroll-padding-top: 80px; }
    * { box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', 'Outfit', sans-serif; margin: 0; }

    .app-wrapper {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .main-content {
      flex: 1;
      width: 100%;
      overflow-y: auto;
    }

    /* Animated gradient background */
    .hero-bg {
      background: linear-gradient(135deg, #0a0e27 0%, #1a1040 30%, #0d2137 60%, #0a0e27 100%);
      position: relative;
    }
    
    /* Header bar */
    .header-bar {
      position: sticky;
      top: 0;
      z-index: 40;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(10, 14, 39, 0.9);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    /* Floating particles */
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: particleFloat linear infinite;
    }
    @keyframes particleFloat {
      0% { transform: translateY(0) scale(1); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-400px) scale(0.5); opacity: 0; }
    }

    /* Card hover effects */
    .project-card {
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
    }
    .project-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    /* Scroll reveal */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Glowing text */
    .glow-text {
      text-shadow: 0 0 40px rgba(99, 220, 210, 0.3), 0 0 80px rgba(99, 220, 210, 0.1);
    }

    /* Bottom nav */
    .bottom-nav {
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .nav-item {
      transition: all 0.3s ease;
    }
    .nav-item.active {
      transform: translateY(-4px);
    }
    .nav-item.active .nav-dot {
      transform: scale(1);
      opacity: 1;
    }
    .nav-dot {
      transform: scale(0);
      opacity: 0;
      transition: all 0.3s ease;
    }

    /* Tag pill */
    .tag-pill {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    /* Typing cursor */
    .typing-cursor {
      display: inline-block;
      width: 3px;
      height: 1em;
      background: #63dcd2;
      margin-left: 4px;
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Level badge */
    .level-badge {
      position: relative;
      overflow: hidden;
    }
    .level-badge::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
      animation: shimmer 3s ease-in-out infinite;
    }
    @keyframes shimmer {
      0% { transform: translateX(-100%) rotate(45deg); }
      100% { transform: translateX(100%) rotate(45deg); }
    }
  </style>

      desc: '자율주행차 트롤리 딜레마 등 AI 윤리 이슈를 시뮬레이션하며 토론하는 수업',
      ai: 'AI 의사결정 시뮬레이션',
      tags: ['AI윤리', '비판적사고', '토론'],
      accentFrom: '#ff6b6b',
      accentTo: '#ff8a80'
    },
    {
      id: 6,
      level: 'special',
      badge: '💛 특수',
      badgeColor: 'rgba(255,200,50,0.15)',
      badgeBorder: 'rgba(255,200,50,0.3)',
      badgeText: '#ffc832',
      title: '감각 놀이터',
      subject: '특수교육 · 감각통합',
      desc: '터치, 소리, 색상 변화에 반응하는 감각 자극 활동. 큰 버튼과 직관적 UI 적용',
      ai: 'AI 적응형 난이도 조절',
      tags: ['감각통합', '접근성', '적응학습'],
      accentFrom: '#ffc832',
      accentTo: '#ffe082'
    }
  ];

  // ====== RENDER PROJECT CARDS ======
  function renderProjects(filter = 'all') {
    const grid = document.getElementById('projectGrid');
    const filtered = filter === 'all' ? projects : projects.filter(p => p.level === filter);
    grid.innerHTML = '';

    filtered.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'project-card rounded-2xl overflow-hidden reveal visible';
      card.style.cssText = `background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); animation-delay:${i * 0.1}s;`;
      card.innerHTML = `
        <div class="p-1.5">
          <div class="rounded-xl p-4" style="background:linear-gradient(135deg, ${p.accentFrom}08, ${p.accentTo}05);">
            <div class="flex items-center justify-between mb-3">
              <span class="tag-pill" style="background:${p.badgeColor}; border:1px solid ${p.badgeBorder}; color:${p.badgeText};">${p.badge}</span>
              <i data-lucide="arrow-up-right" class="text-gray-600" style="width:14px;height:14px;"></i>
            </div>
            <h3 class="text-white font-bold text-sm mb-1">${p.title}</h3>
            <p class="text-xs mb-2.5" style="color:${p.badgeText}; opacity:0.8;">${p.subject}</p>
            <p class="text-gray-500 text-xs leading-relaxed mb-3">${p.desc}</p>
            <div class="flex items-center gap-1.5 mb-3 p-2 rounded-lg" style="background:rgba(0,0,0,0.2);">
              <i data-lucide="cpu" style="width:13px;height:13px; color:${p.badgeText};"></i>
              <span class="text-[9px] text-gray-400">${p.ai}</span>
            </div>
            <div class="flex flex-wrap gap-1">
              ${p.tags.map(t => `<span class="tag-pill text-gray-500" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); font-size:9px;">#${t}</span>`).join('')}
            </div>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });

    lucide.createIcons();
  }

  // ====== FILTER TABS ======
  document.getElementById('filterTabs').addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-tab');
    if (!btn) return;
    document.querySelectorAll('.filter-tab').forEach(b => {
      b.classList.remove('active');
      b.style.background = 'rgba(255,255,255,0.05)';
      b.style.borderColor = 'rgba(255,255,255,0.1)';
      b.classList.remove('text-white');
      b.classList.add('text-gray-400');
    });
    btn.classList.add('active');
    btn.style.background = 'rgba(99,220,210,0.2)';
    btn.style.borderColor = 'rgba(99,220,210,0.4)';
    btn.classList.add('text-white');
    btn.classList.remove('text-gray-400');
    renderProjects(btn.dataset.filter);
  });

  // ====== SCROLL REVEAL ======
  const mainContent = document.querySelector('.main-content');

  function checkReveal() {
    const reveals = document.querySelectorAll('.reveal:not(.visible)');
    reveals.forEach(el => {
      const rect = el.getBoundingClientRect();
      if (rect.top < window.innerHeight * 0.88) {
        el.classList.add('visible');
      }
    });
  }

  mainContent.addEventListener('scroll', checkReveal);
  window.addEventListener('resize', checkReveal);

  // ====== ACTIVE NAV TRACKING ======
  const sections = ['projects', 'contact'];

  function updateNav() {
    const headerHeight = 80;
    let currentSection = 'projects';
    sections.forEach(id => {
      const section = document.getElementById(id);
      if (section) {
        const rect = section.getBoundingClientRect();
        if (rect.top <= headerHeight + 200) {
          currentSection = id;
        }
      }
    });
    document.querySelectorAll('.nav-item').forEach(item => {
      const isActive = item.dataset.section === currentSection;
      item.classList.toggle('active', isActive);
      const icon = item.querySelector('[data-lucide]');
      const label = item.querySelector('span');
      if (icon) icon.className = isActive ? 'text-mint-500' : 'text-gray-500';
      if (label) label.className = isActive ? 'text-[9px] text-mint-500 font-medium' : 'text-[9px] text-gray-500 font-medium';
    });
  }
  mainContent.addEventListener('scroll', updateNav);

  // ====== ELEMENT SDK ======
  const defaultConfig = {
    portfolio_title: 'AI × Education Lab',
    portfolio_subtitle: 'AI와 교육의 만남, 미래를 여는 융합 콘텐츠',
    contact_title: '함께 만들어요',
    background_color: '#0a0e27',
    surface_color: '#111638',
    text_color: '#ffffff',
    primary_action_color: '#63dcd2',
    secondary_action_color: '#7864ff',
    font_family: 'Outfit',
    font_size: 16
  };

  function applyConfig(config) {
    const c = { ...defaultConfig, ...config };

    // Text content
    const titleEl = document.getElementById('portfolioTitle');
    if (titleEl) {
      const parts = (c.portfolio_title || defaultConfig.portfolio_title).split('\n');
      if (parts.length > 1) {
        titleEl.innerHTML = parts[0] + '<br><span class="text-mint-500" style="display:block;">' + parts[1] + '</span>';
      } else {
        titleEl.textContent = c.portfolio_title || defaultConfig.portfolio_title;
      }
    }

    const contactTitleEl = document.getElementById('contactTitle');
    if (contactTitleEl) contactTitleEl.textContent = c.contact_title || defaultConfig.contact_title;

    // Colors
    const bg = c.background_color || defaultConfig.background_color;
    const primary = c.primary_action_color || defaultConfig.primary_action_color;
    const textCol = c.text_color || defaultConfig.text_color;

    document.getElementById('app').style.background = bg;
    document.querySelectorAll('h1, h2, h3, .text-white').forEach(el => el.style.color = textCol);

    // Font
    const fontFamily = c.font_family || defaultConfig.font_family;
    const baseFontStack = "'Noto Sans KR', sans-serif";
    document.body.style.fontFamily = `'${fontFamily}', ${baseFontStack}`;
    document.querySelectorAll('h1, h2').forEach(el => {
      el.style.fontFamily = `'${fontFamily}', ${baseFontStack}`;
    });
