  <style>
    html, body { height: 100%; margin: 0; padding: 0; }

    }

    .main-content {
      flex: 1;
      width: 100%;
      overflow-y: auto;
      overflow-x: hidden;
    }

      position: sticky;

      z-index: 40;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(10, 14, 39, 0.95);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      padding: 12px 24px;
    }

    @media (min-width: 768px) {
      .header-bar { padding: 16px 32px; }
    }

    .header-title-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    @media (min-width: 768px) {
      .header-title-wrapper { gap: 16px; }
    }

    .header-logo {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, #63dcd2 0%, #7864ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(99, 220, 210, 0.3);
      flex-shrink: 0;
    }

    @media (min-width: 768px) {
      .header-logo { width: 42px; height: 42px; }
    }

    #portfolioTitle {
      font-size: 14px;
      font-weight: 900;
      color: white;
      letter-spacing: -0.5px;
      line-height: 1.1;
      font-family: 'Outfit', sans-serif;
    }

    @media (min-width: 768px) {
      #portfolioTitle { font-size: 16px; }
    }

    .hero-bg {
      background: linear-gradient(135deg, #0a0e27 0%, #1a1040 30%, #0d2137 60%, #0a0e27 100%);
      padding: 40px 24px 80px;
    }

    @media (min-width: 768px) {
      .hero-bg { padding: 60px 32px 100px; }
    }

    .responsive-container {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
    }

    @media (min-width: 768px) {
      .responsive-container { max-width: 750px; margin: 0 auto; }
    }

    @media (min-width: 1024px) {
      .responsive-container { max-width: 1200px; margin: 0 auto; }
    }

    @media (min-width: 1280px) {
      .responsive-container { max-width: 1400px; margin: 0 auto; }
    }

    .project-grid-responsive {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-top: 24px;
    }

    @media (min-width: 768px) {
      .project-grid-responsive {
        grid-template-columns: repeat(2, 1fr);
        gap: 24px;
      }
    }

    @media (min-width: 1024px) {
      .project-grid-responsive {
        grid-template-columns: repeat(3, 1fr);
        gap: 28px;
      }
    }

    .project-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 12px;
      cursor: pointer;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .project-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .card-inner {
      border-radius: 12px;
      padding: 16px;
      background: rgba(99, 220, 210, 0.08);
    }

    .tag-pill {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
      border: 1px solid rgba(99, 220, 210, 0.3);
      background: rgba(99, 220, 210, 0.15);
      color: #63dcd2;
    }

    .filter-tabs-wrapper {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin-bottom: 24px;
      padding-bottom: 8px;
    }

    .filter-tab {
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid;
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.1);
      color: #999;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .filter-tab.active {
      background: rgba(99, 220, 210, 0.2);
      border-color: rgba(99, 220, 210, 0.4);
      color: #63dcd2;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #7864ff;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .section-desc {
      font-size: 12px;
      color: #666;
      margin-bottom: 24px;
    }

    .contact-section {
      background: linear-gradient(180deg, #0a0e27 0%, #0a0e27 100%);
      padding: 60px 24px 30px;
    }

    @media (min-width: 768px) {
      .contact-section { padding: 80px 32px 40px; }
    }

    #contactTitle {
      font-size: 20px;
      font-weight: 700;
      color: white;
      margin-bottom: 12px;
      font-family: 'Outfit', sans-serif;
    }

    @media (min-width: 768px) {
      #contactTitle { font-size: 24px; }
    }

    .contact-text {
      font-size: 12px;
      color: #999;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      margin-bottom: 12px;
      text-align: left;
    }

    @media (min-width: 768px) {
      .contact-item {
        padding: 20px;
        border-radius: 16px;
        margin-bottom: 16px;
      }
    }

    .contact-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-icon.mint { background: rgba(99, 220, 210, 0.2); }
    .contact-icon.iris { background: rgba(120, 100, 255, 0.2); }

    .contact-label {
      font-size: 8px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .contact-value {
      font-size: 12px;
      color: white;
    }

    .bottom-nav {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 8px 16px;
      background: rgba(10, 14, 39, 0.95);
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    @media (min-width: 768px) {
      .bottom-nav { display: none; }
      .main-content { padding-bottom: 0; }
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
      text-align: center;
      text-decoration: none;
      color: #666;
      font-size: 9px;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .nav-item.active {
      color: #63dcd2;
      transform: translateY(-2px);
    }

    .nav-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #63dcd2;
      opacity: 0;
      transform: scale(0);
      transition: all 0.3s ease;
    }

    .nav-item.active .nav-dot {
      opacity: 1;
      transform: scale(1);
    }

    .footer-text {
      text-align: center;
      margin-top: 32px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 10px;
      color: #555;
    }
  </style>

 <body class="h-full">

       <path d="M16 4L4 10v12l12 6 12-6V10L16 4z" stroke="white" stroke-width="2" fill="none" /> <circle cx="16" cy="16" r="4" fill="white" opacity="0.9" /> <path d="M16 12v-4M16 24v-4M20 16h4M8 16h4" stroke="white" stroke-width="1.5" opacity="0.6" />

   <nav class="bottom-nav">

     <div class="nav-dot"></div></a> <a href="#contact" class="nav-item" data-section="contact"> <i data-lucide="send" style="width: 18px; height: 18px;"></i> <span>연락</span>

  <script>
    // Project data
    const projects = [
            {
        id: 1,
        level: 'elementary',

        accentFrom: '#63dcd2',
        accentTo: '#80ffe8',
        accentBg: 'rgba(99,220,210,0.08)',
      
        detailContent: `
          <div style="space-y: 24px;">
            <div style="margin-bottom: 24px;">
              <span class="tag-pill" style="margin-bottom: 16px; display: inline-block;">🌱 초등</span>
              <h2 style="font-size: 28px; font-weight: 700; color: white; margin: 16px 0 8px; font-family: 'Outfit', sans-serif;">동물 분류 AI 탐험</h2>
              <p style="color: #999; font-size: 12px;">과학 3-4학년 · 동물의 생활</p>
            </div>
            <div style="margin-bottom: 16px;">
              <h3 style="color: white; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
                <i data-lucide="target" style="width: 16px; height: 16px; color: #63dcd2;"></i>
                프로젝트 개요
              </h3>
              <p style="color: #aaa; font-size: 12px; line-height: 1.6;">카메라로 동물 사진을 찍으면 AI가 척추동물/무척추동물을 자동으로 분류해주는 체험형 학습 프로젝트입니다. 학생들이 직접 사진을 찍고 실시간으로 분류 결과를 확인하며 즐겁게 배웁니다.</p>
            </div>
            <div style="margin-bottom: 16px;">
              <h3 style="color: white; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
                <i data-lucide="cpu" style="width: 16px; height: 16px; color: #7864ff;"></i>
                AI 기술
              </h3>
              <p style="color: #aaa; font-size: 12px;">이미지 분류 (Image Classification) · Teachable Machine</p>
            </div>
            <div>
              <h3 style="color: white; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
                <i data-lucide="sparkles" style="width: 16px; height: 16px; color: #ff8a80;"></i>
                학습 효과
              </h3>
              <ul style="color: #aaa; font-size: 12px; padding-left: 20px; margin: 0;">
                <li style="margin-bottom: 8px;">✓ 동물의 특징을 직접 관찰하며 분류 기준 이해</li>
                <li style="margin-bottom: 8px;">✓ AI의 판단 과정을 체험하며 인공지능 이해도 향상</li>
                <li>✓ 과학적 사고력 및 탐구 능력 발달</li>
              </ul>
            </div>
          </div>
        `
      },
      {
        id: 2,
        level: 'elementary',
        badge: '🌱 초등',
        title: ' 인공지능 받아쓰기',
        subject: '국어 1-2학년 · 받침이 있는 글자',
        desc: '인공지능 읽어주기 기능을 활용하여 받아쓰기 학습을 해보세요.',
        ai: 'AI 읽어주기',
        tags: ['글쓰기', '받아쓰기', "읽어주기"],
        accentFrom: '#ff8a80',
        accentTo: '#ffb3ab',
        accentBg: 'rgba(255,138,128,0.08)',
        link: 'https://naver.me/xk9jicsR',
        detailContent: `
          <div style="space-y: 24px;">
            <div style="margin-bottom: 24px;">
              <span class="tag-pill" style="background: rgba(255,138,128,0.2); border-color: rgba(255,138,128,0.4); color: #ff8a80; margin-bottom: 16px; display: inline-block;">🌱 초등</span>
              <h2 style="font-size: 28px; font-weight: 700; color: white; margin: 16px 0 8px; font-family: 'Outfit', sans-serif;">감정 일기 친구</h2>
              <p style="color: #999; font-size: 12px;">국어 1-2학년 · 느낌을 말해요</p>
            </div>
            <div style="margin-bottom: 16px;">
              <h3 style="color: white; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
                <i data-lucide="heart" style="width: 16px; height: 16px; color: #ff8a80;"></i>
                프로젝트 개요
              </h3>
              <p style="color: #aaa; font-size: 12px; line-height: 1.6;">매일의 감정을 선택하고 일기를 쓰면 AI가 감정을 분석하고 따뜻한 공감 메시지를 보내줍니다. 정서적 안정감을 주면서 글쓰기 능력도 함께 향상시킵니다.</p>
            </div>
            <div style="margin-bottom: 16px;">
              <h3 style="color: white; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
                <i data-lucide="cpu" style="width: 16px; height: 16px; color: #7864ff;"></i>
                AI 기술
              </h3>
              <p style="color: #aaa; font-size: 12px;">감정 분석 (Sentiment Analysis) · 자연어 처리</p>
            </div>
            <div>
              <h3 style="color: white; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
                <i data-lucide="sparkles" style="width: 16px; height: 16px; color: #ff8a80;"></i>
                학습 효과
              </h3>
              <ul style="color: #aaa; font-size: 12px; padding-left: 20px; margin: 0;">
                <li style="margin-bottom: 8px;">✓ 자신의 감정을 표현하고 정리하는 능력 배양</li>
                <li style="margin-bottom: 8px;">✓ 글쓰기 습관 형성 및 문해력 향상</li>
                <li>✓ 공감 능력과 정서지능 발달</li>
              </ul>
            </div>
            <div style="margin-top: 32px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.1);">
              <a href="#" onclick="return false;" class="project-detail-link" data-project-id="2" style="display: inline-flex; align-items: center; gap: 8px; padding: 12px 16px; background: rgba(99,220,210,0.2); border: 1px solid rgba(99,220,210,0.4); border-radius: 8px; color: #63dcd2; text-decoration: none; font-size: 12px; font-weight: 600; transition: all 0.3s ease;">
                <i data-lucide="external-link" style="width: 14px; height: 14px;"></i>
                전체 프로젝트 보기
              </a>
            </div>
          </div>
        `
      },
    ];


    
    // Render projects
    function renderProjects(filter = 'all') {
      const grid = document.getElementById('projectGrid');
      const filtered = filter === 'all' ? projects : projects.filter(p => p.level === filter);
      grid.innerHTML = '';

      filtered.forEach((p) => {
        const card = document.createElement('div');
        card.className = 'project-card';
        card.innerHTML = `
          <div class="card-inner" style="background: ${p.accentBg};">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;">
              <span class="tag-pill">${p.badge}</span>
              <i data-lucide="arrow-up-right" style="width: 14px; height: 14px; color: #666;"></i>
            </div>
            <h3 style="color: white; font-weight: 600; font-size: 14px; margin: 0 0 4px; margin-bottom: 8px;">${p.title}</h3>
            <p style="color: ${p.accentFrom}; opacity: 0.8; font-size: 11px; margin: 0 0 12px;">${p.subject}</p>
            <p style="color: #999; font-size: 11px; line-height: 1.5; margin: 0 0 12px;">${p.desc}</p>
            <div style="display: flex; align-items: center; gap: 6px; padding: 8px; border-radius: 8px; background: rgba(0,0,0,0.2); margin-bottom: 12px;">
              <i data-lucide="cpu" style="width: 12px; height: 12px; color: ${p.accentFrom};"></i>
              <span style="font-size: 9px; color: #999;">${p.ai}</span>
            </div>
            <div style="display: flex; flex-wrap: wrap; gap: 6px;">
              ${p.tags.map(t => `<span class="tag-pill" style="background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.08); color: #999; font-size: 9px;">#${t}</span>`).join('')}
            </div>
          </div>
        `;
        card.addEventListener('click', () => openProjectDetail(p));
        grid.appendChild(card);
      });

      lucide.createIcons();
    }

   

        // Open project detail - open new window with project-specific HTML
    function openProjectDetail(project) {
      if (project.link) {
        window.open(project.link, '_blank', 'noopener,noreferrer');
      }
      // Store the project data in sessionStorage so the detail page can access it
      sessionStorage.setItem('selectedProject', JSON.stringify(project));
      // Open in new window: project-1.html, project-2.html, etc.
      // window.open(`project-${project.id}.html`, '_blank', 'width=1200,height=800');
       window.open(`project-${project.id}.html`, '_blank');
    }



    // Filter tabs
    document.getElementById('filterTabs').addEventListener('click', (e) => {
      const btn = e.target.closest('.filter-tab');
      if (!btn) return;

      document.querySelectorAll('.filter-tab').forEach(b => {
        b.classList.remove('active');
      });
      btn.classList.add('active');
      renderProjects(btn.dataset.filter);
    });

    // Bottom nav
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
      });
    });

    // Element SDK
    const defaultConfig = {
