<!doctype html>
<html lang="ko" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 융합 교육 포트폴리오</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&amp;family=Outfit:wght@400;600;700;900&amp;display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="stylesheet" href="./style.css" />
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="app-wrapper" style="background: #0a0e27;"><!-- HEADER -->
   <header class="header-bar">
    <div class="header-title-wrapper">
     <div class="header-logo">
      <svg width="18" height="18" viewbox="0 0 32 32" fill="none"><path d="M16 4L4 10v12l12 6 12-6V10L16 4z" stroke="white" stroke-width="2" fill="none" /> <circle cx="16" cy="16" r="4" fill="white" opacity="0.9" /> <path d="M16 12v-4M16 24v-4M20 16h4M8 16h4" stroke="white" stroke-width="1.5" opacity="0.6" />
      </svg>
     </div>
     <div>
      <h1 id="portfolioTitle">AI × Education<br><span style="color: #63dcd2;">그쌤 &nbsp; Project</span></h1>
     </div>
    </div>
   </header><!-- MAIN CONTENT -->
   <div class="main-content"><!-- PROJECTS SECTION -->
    <section id="projects" class="hero-bg">
     <div class="responsive-container">
      <div>
       <div class="section-label">
        PROJECTS
       </div>
       <div class="section-desc">
        학교급별 교육과정에 맞춘 인터랙티브 콘텐츠
       </div>
      </div><!-- FILTER TABS -->
      <div class="filter-tabs-wrapper" id="filterTabs"><button class="filter-tab active" data-filter="all">전체</button> <button class="filter-tab" data-filter="elementary">🌱 초등</button> <button class="filter-tab" data-filter="middle">🔬 중등</button> <button class="filter-tab" data-filter="high">🚀 고등</button> <button class="filter-tab" data-filter="special">💛 특수</button>
      </div><!-- PROJECT GRID -->
      <div id="projectGrid" class="project-grid-responsive"></div>
     </div>
    </section><!-- CONTACT SECTION -->
    <section id="contact" class="contact-section">
     <div class="responsive-container" style="text-align: center;">
      <div style="margin-bottom: 24px;">
       <div class="section-label" style="text-align: center; margin-bottom: 12px;">
        CONTACT
       </div>
       <h2 id="contactTitle">함께 만들어요</h2>
       <p class="contact-text">AI 융합 교육 콘텐츠에 관심이 있으시다면<br>
         언제든 연락해 주세요.</p>
      </div>
      <div style="max-width: 500px; margin: 0 auto; text-align: left;">
       <div class="contact-item">
        <div class="contact-icon mint">
         <i data-lucide="mail" style="width: 16px; height: 16px; color: #63dcd2;"></i>
        </div>
        <div>
         <div class="contact-label">
          Email
         </div>
         <div class="contact-value">
          work.jungah@gmail.com
         </div>
        </div>
       </div><!-- GitHub item commented out
       <div class="contact-item">
        <div class="contact-icon iris">
         <i data-lucide="github" style="width: 16px; height: 16px; color: #7864ff;"></i>
        </div>
        <div>
         <div class="contact-label">
          GitHub
         </div>
         <div class="contact-value">
          github.com/ai-edu-lab
         </div>
        </div>
       </div>
       -->
      </div>
      <div class="footer-text">
       © 2026 AI × Education 그쌤 Project
      </div>
     </div>
    </section>
   </div><!-- MODAL OVERLAY -->
   <div id="modalOverlay" class="modal-overlay">
    <div class="modal-content" id="modalContent">
     <div class="modal-header">
      <h2 id="modalTitle" style="margin: 0; font-size: 20px; color: white; flex: 1;"></h2><button class="modal-close" onclick="closeModal()"><i data-lucide="x" style="width: 20px; height: 20px;"></i></button>
     </div>
     <div id="modalBody" style="color: #aaa;"></div>
    </div>
   </div><!-- BOTTOM NAV -->
   <nav class="bottom-nav"><a href="#projects" class="nav-item active" data-section="projects"> <i data-lucide="layers" style="width: 18px; height: 18px;"></i> <span>프로젝트</span>
     <div class="nav-dot"></div></a> <a href="#contact" class="nav-item" data-section="contact"> <i data-lucide="send" style="width: 18px; height: 18px;"></i> <span>연락</span>
     <div class="nav-dot"></div></a>
   </nav>
  </div>
  <script>

        // 1. 데이터를 담을 빈 그릇을 먼저 만듭니다.
        let projects = []; 

        // 2. 데이터를 불러오고 화면을 그리는 함수를 만듭니다.
        async function loadData() {
            try {
          // projects.json 파일을 가져옵니다.
                const response = await fetch('./data.json'); 
                
                if (!response.ok) {
                    throw new Error("파일을 찾을 수 없습니다.");
                }

          // 가져온 데이터를 projects 변수에 넣습니다.
                projects = await response.json(); 
                
          // 데이터가 성공적으로 로드된 '후'에 화면을 그립니다.
                renderProjects('all'); 
                lucide.createIcons();
                
                console.log("데이터 로드 완료!", projects);
            } catch (error) {
                console.error("에러 발생:", error);
                document.getElementById('projectGrid').innerHTML = "데이터를 불러오는 중 오류가 발생했습니다.";
            }
        }

        // 3. 페이지가 로드되면 함수를 실행합니다.
        window.onload = loadData;

    // Render projects
    function renderProjects(filter = 'all') {
      const grid = document.getElementById('projectGrid');
      const filtered = filter === 'all' ? projects : projects.filter(p => p.level.includes(filter));
      grid.innerHTML = '';

      filtered.forEach((p) => {
        const card = document.createElement('div');
        card.className = 'project-card';
        const badgeHtml = p.badge.map(b => `<span class="tag-pill">${b}</span>`).join('');
        const subjectText = p.subject.join('<br>');
        card.innerHTML = `
          <div class="card-inner" style="background: ${p.accentBg};">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 8px;">
              <div style="display: flex; gap: 6px; flex-wrap: wrap;">${badgeHtml}</div>
              <i data-lucide="arrow-up-right" style="width: 14px; height: 14px; color: #666; flex-shrink: 0;"></i>
            </div>
            <h3 style="color: white; font-weight: 600; font-size: 14px; margin: 0 0 4px; margin-bottom: 8px;">${p.title}</h3>
            <p style="color: ${p.accentFrom}; opacity: 0.8; font-size: 11px; margin: 0 0 12px; line-height: 1.4;">${subjectText}</p>
            <p style="color: #999; font-size: 11px; line-height: 1.5; margin: 0 0 12px;">${p.desc}</p>
            <div style="display: flex; align-items: center; gap: 6px; padding: 8px; border-radius: 8px; background: rgba(0,0,0,0.2); margin-bottom: 12px;">
              <i data-lucide="cpu" style="width: 12px; height: 12px; color: ${p.accentFrom};"></i>
              <span style="font-size: 9px; color: #999;">${p.ai}</span>
            </div>
            <div style="display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;">
              ${p.tags.map(t => `<span class="tag-pill" style="background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.08); color: #999; font-size: 9px;">#${t}</span>`).join('')}
            </div>
            <div class="button-group">
              <button class="btn-primary" onclick="openProjectLink(${p.id})"><i data-lucide="external-link" style="width: 14px; height: 14px;"></i>방문</button>
              
            </div>
          </div>
        `;
        grid.appendChild(card);
      });

      lucide.createIcons();
    }

    

    // Open project link in new window
    function openProjectLink(projectId) {
      const project = projects.find(p => p.id === projectId);
      if (project && project.link) {
        window.open(project.link, '_blank', 'noopener,noreferrer');
      }
    }

      function openProjectModal(projectId) {
      const project = projects.find(p => p.id === projectId);
      if (project) {
        document.getElementById('modalTitle').textContent = project.title;
        
        // 이 부분이 핵심입니다! HTML 템플릿 함수를 호출하여 결과물을 넣습니다.
        document.getElementById('modalBody').innerHTML = generateModalHTML(project);
        
        document.getElementById('modalOverlay').classList.add('active');
        
        // 아이콘 생성 실행
        if (window.lucide) {
          lucide.createIcons();
        }
      }
    }


  // 여러 줄의 데이터를 처리하는 보조 함수
function renderList(data) {
  if (!data) return "";
  // 데이터가 배열이면 줄바꿈(br)으로 합치고, 아니면 그대로 반환
  if (Array.isArray(data)) {
    return data.join('<br>');
  }
  return data;
}

  function generateModalHTML(project) {
  return `
    <div style="display: flex; flex-direction: column; gap: 24px;">
      <div>
        <span class="tag-pill" style="margin-bottom: 16px; display: inline-block;">${project.badge}</span>
        <h2 style="font-size: 28px; font-weight: 700; color: white; margin: 16px 0 8px;">${project.title}</h2>
        <p style="color: #999; font-size: 12px;">${project.subject}</p>
      </div>

      <div>
        <h3 style="color: white; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
          <i data-lucide="target" style="width: 16px; height: 16px; color: #63dcd2;"></i> 프로젝트 개요
        </h3>
        <p style="color: #aaa; font-size: 13px; line-height: 1.6;">
          ${renderList(project.overview)}
        </p>
      </div>

      <div>
        <h3 style="color: white; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
          <i data-lucide="cpu" style="width: 16px; height: 16px; color: #7864ff;"></i> AI 기술
        </h3>
        <p style="color: #aaa; font-size: 13px;">${project.aiTech}</p>
      </div>

       <div>
        <h3 style="color: white; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
          <i data-lucide="round" style="width: 16px; height: 16px; color: #7864ff;"></i> 사용한 에듀테크 도구
        </h3>
        <p style="color: #aaa; font-size: 13px;">${project.tools}</p>
      </div>


     <div>
        <h3 style="color: white; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
          <i data-lucide="message-square" style="width: 16px; height: 16px; color: #ffc832;"></i> 프롬프트 (Prompt)
        </h3>
        <div style="background: rgba(255,255,255,0.05); padding: 16px; border-radius: 8px; color: #aaa; font-size: 13px; line-height: 1.8; border-left: 4px solid #ffc832; ">
          ${renderList(project.prompt)}
        </div>
      </div>

     <div>
        <h3 style="color: white; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
          <i data-lucide="sparkles" style="width: 16px; height: 16px; color: #ff8a80;"></i> 학습 효과
        </h3>
        <ul style="color: #aaa; font-size: 13px; padding-left: 20px; margin: 0;">
          ${Array.isArray(project.effects) 
            ? project.effects.map(effect => `<li style="margin-bottom: 8px;">✓ ${effect}</li>`).join('')
            : `<li>✓ ${project.effects}</li>`}
        </ul>
      </div>
    </div>
  `;
}

    // Close modal
    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    // Close modal when clicking outside
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) {
        closeModal();
      }
    });

    // Filter tabs
    document.getElementById('filterTabs').addEventListener('click', (e) => {
      const btn = e.target.closest('.filter-tab');
      if (!btn) return;

      document.querySelectorAll('.filter-tab').forEach(b => {
        b.classList.remove('active');
      });
      btn.classList.add('active');
      renderProjects(btn.dataset.filter);
    });

    // Bottom nav
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');

        // Scroll to section
        const section = item.dataset.section;
        const element = document.getElementById(section);
        if (element) {
          element.scrollIntoView({ behavior: 'smooth' });
        }
      });
    });

    // Element SDK
    const defaultConfig = {
      portfolio_title: 'AI × Education Lab',
      portfolio_subtitle: 'AI와 교육의 만남',
      contact_title: '함께 만들어요'
    };

    function applyConfig(config) {
      const c = { ...defaultConfig, ...config };
      const titleEl = document.getElementById('portfolioTitle');
      if (titleEl) {
        titleEl.innerHTML = 'AI × Education<br><span style="color: #63dcd2;">그쌤 Project</span>';
      }
      const contactTitleEl = document.getElementById('contactTitle');
      if (contactTitleEl) contactTitleEl.textContent = c.contact_title;
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: applyConfig,
        mapToCapabilities: (config) => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ['portfolio_title', config.portfolio_title || defaultConfig.portfolio_title],
          ['portfolio_subtitle', config.portfolio_subtitle || defaultConfig.portfolio_subtitle],
          ['contact_title', config.contact_title || defaultConfig.contact_title]
        ])
      });
    }

    // Initial render
    renderProjects();
    lucide.createIcons();
  </script>

</html>
