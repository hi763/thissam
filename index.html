<html lang="ko" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 융합 교육 포트폴리오</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&amp;family=Outfit:wght@400;600;700;900&amp;display=swap" rel="stylesheet">

  <script src="/_sdk/element_sdk.js"></script>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
    * { box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0e27; }

    .app-wrapper {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .main-content {
      flex: 1;
      width: 100%;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .header-bar {
      position: sticky;
      top: 0;
      z-index: 40;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(10, 14, 39, 0.95);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      padding: 12px 24px;
    }

    @media (min-width: 768px) {
      .header-bar { padding: 16px 32px; }
    }

    .header-title-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    @media (min-width: 768px) {
      .header-title-wrapper { gap: 16px; }
    }

    .header-logo {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, #63dcd2 0%, #7864ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(99, 220, 210, 0.3);
      flex-shrink: 0;
    }

    @media (min-width: 768px) {
      .header-logo { width: 42px; height: 42px; }
    }

    #portfolioTitle {
      font-size: 14px;
      font-weight: 900;
      color: white;
      letter-spacing: -0.5px;
      line-height: 1.1;
      font-family: 'Outfit', sans-serif;
      animation: slideInDown 0.6s ease-out, fadeIn 0.6s ease-out;
    }

    @media (min-width: 768px) {
      #portfolioTitle { font-size: 16px; }
    }

    .hero-bg {
      background: linear-gradient(135deg, #0a0e27 0%, #1a1040 30%, #0d2137 60%, #0a0e27 100%);
      padding: 40px 24px 80px;
    }

    @media (min-width: 768px) {
      .hero-bg { padding: 60px 32px 100px; }
    }

    .responsive-container {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
    }

    @media (min-width: 768px) {
      .responsive-container { max-width: 750px; margin: 0 auto; }
    }

    @media (min-width: 1024px) {
      .responsive-container { max-width: 1200px; margin: 0 auto; }
    }

    @media (min-width: 1280px) {
      .responsive-container { max-width: 1400px; margin: 0 auto; }
    }

    .project-grid-responsive {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-top: 24px;
    }

    @media (min-width: 768px) {
      .project-grid-responsive {
        grid-template-columns: repeat(2, 1fr);
        gap: 24px;
      }
    }

    @media (min-width: 1024px) {
      .project-grid-responsive {
        grid-template-columns: repeat(3, 1fr);
        gap: 28px;
      }
    }

    .project-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 12px;
      cursor: pointer;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .project-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .card-inner {
      border-radius: 12px;
      padding: 16px;
      background: rgba(99, 220, 210, 0.08);
    }

    .tag-pill {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
      border: 1px solid rgba(99, 220, 210, 0.3);
      background: rgba(99, 220, 210, 0.15);
      color: #63dcd2;
    }

    .filter-tabs-wrapper {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin-bottom: 24px;
      padding-bottom: 8px;
      justify-content: center;
    }

    .filter-tab {
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid;
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.1);
      color: #999;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .filter-tab.active {
      background: rgba(99, 220, 210, 0.2);
      border-color: rgba(99, 220, 210, 0.4);
      color: #63dcd2;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #7864ff;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .section-desc {
      font-size: 12px;
      color: #666;
      margin-bottom: 24px;
    }

    .contact-section {
      background: linear-gradient(180deg, #0a0e27 0%, #0a0e27 100%);
      padding: 60px 24px 30px;
    }

    @media (min-width: 768px) {
      .contact-section { padding: 80px 32px 40px; }
    }

    #contactTitle {
      font-size: 20px;
      font-weight: 700;
      color: white;
      margin-bottom: 12px;
      font-family: 'Outfit', sans-serif;
    }

    @media (min-width: 768px) {
      #contactTitle { font-size: 24px; }
    }

    .contact-text {
      font-size: 12px;
      color: #999;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      margin-bottom: 12px;
      text-align: left;
    }

    @media (min-width: 768px) {
      .contact-item {
        padding: 20px;
        border-radius: 16px;
        margin-bottom: 16px;
      }
    }

    .contact-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-icon.mint { background: rgba(99, 220, 210, 0.2); }
    .contact-icon.iris { background: rgba(120, 100, 255, 0.2); }

    .contact-label {
      font-size: 8px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .contact-value {
      font-size: 12px;
      color: white;
    }

    .bottom-nav {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 8px 16px;
      background: rgba(10, 14, 39, 0.95);
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    @media (min-width: 768px) {
      .bottom-nav { display: none; }
      .main-content { padding-bottom: 0; }
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
      text-align: center;
      text-decoration: none;
      color: #666;
      font-size: 9px;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .nav-item.active {
      color: #63dcd2;
      transform: translateY(-2px);
    }

    .nav-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #63dcd2;
      opacity: 0;
      transform: scale(0);
      transition: all 0.3s ease;
    }

    .nav-item.active .nav-dot {
      opacity: 1;
      transform: scale(1);
    }

    .footer-text {
      text-align: center;
      margin-top: 32px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 10px;
      color: #555;
    }

    @keyframes slideInDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 50;
      animation: fadeIn 0.3s ease-out;
      overflow-y: auto;
    }

    .modal-overlay.active {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px;
    }

    .modal-content {
      background: #0a0e27;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 24px;
      width: 100%;
      max-width: 600px;
      margin-top: 40px;
      animation: slideInDown 0.3s ease-out;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .modal-close {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.3s ease;
    }

    .modal-close:hover {
      color: #63dcd2;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }

    .btn-primary, .btn-secondary {
      flex: 1;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #63dcd2 0%, #7864ff 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(99, 220, 210, 0.3);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(99, 220, 210, 0.3);
      color: #63dcd2;
    }

    .btn-secondary:hover {
      background: rgba(99, 220, 210, 0.1);
    }
  </style>

 <body class="h-full">
  <div id="app" class="app-wrapper" style="background: #0a0e27;"><!-- HEADER -->
   <header class="header-bar">
    <div class="header-title-wrapper">
     <div class="header-logo">
      <svg width="18" height="18" viewbox="0 0 32 32" fill="none"><path d="M16 4L4 10v12l12 6 12-6V10L16 4z" stroke="white" stroke-width="2" fill="none" /> <circle cx="16" cy="16" r="4" fill="white" opacity="0.9" /> <path d="M16 12v-4M16 24v-4M20 16h4M8 16h4" stroke="white" stroke-width="1.5" opacity="0.6" />
      </svg>
     </div>
     <div>
      <h1 id="portfolioTitle">AI × Education<br><span style="color: #63dcd2;">그쌤 &nbsp; Project</span></h1>
     </div>
    </div>
   </header><!-- MAIN CONTENT -->
   <div class="main-content"><!-- PROJECTS SECTION -->
    <section id="projects" class="hero-bg">
     <div class="responsive-container">
      <div>
       <div class="section-label">
        PROJECTS
       </div>
       <div class="section-desc">
        학교급별 교육과정에 맞춘 인터랙티브 콘텐츠
       </div>
      </div><!-- FILTER TABS -->
      <div class="filter-tabs-wrapper" id="filterTabs"><button class="filter-tab active" data-filter="all">전체</button> <button class="filter-tab" data-filter="elementary">🌱 초등</button> <button class="filter-tab" data-filter="middle">🔬 중등</button> <button class="filter-tab" data-filter="high">🚀 고등</button> <button class="filter-tab" data-filter="special">💛 특수</button>
      </div><!-- PROJECT GRID -->
      <div id="projectGrid" class="project-grid-responsive"></div>
     </div>
    </section><!-- CONTACT SECTION -->
    <section id="contact" class="contact-section">
     <div class="responsive-container" style="text-align: center;">
      <div style="margin-bottom: 24px;">
       <div class="section-label" style="text-align: center; margin-bottom: 12px;">
        CONTACT
       </div>
       <h2 id="contactTitle">함께 만들어요</h2>
       <p class="contact-text">AI 융합 교육 콘텐츠에 관심이 있으시다면<br>
         언제든 연락해 주세요.</p>
      </div>
      <div style="max-width: 500px; margin: 0 auto; text-align: left;">
       <div class="contact-item">
        <div class="contact-icon mint">
         <i data-lucide="mail" style="width: 16px; height: 16px; color: #63dcd2;"></i>
        </div>
        <div>
         <div class="contact-label">
          Email
         </div>
         <div class="contact-value">
          work.jungah@gmail.com
         </div>
        </div>
       </div><!-- GitHub item commented out
       <div class="contact-item">
        <div class="contact-icon iris">
         <i data-lucide="github" style="width: 16px; height: 16px; color: #7864ff;"></i>
        </div>
        <div>
         <div class="contact-label">
          GitHub
         </div>
         <div class="contact-value">
          github.com/ai-edu-lab
         </div>
        </div>
       </div>
       -->
      </div>
      <div class="footer-text">
       © 2026 AI × Education 그쌤 Project
      </div>
     </div>
    </section>
   </div><!-- MODAL OVERLAY -->
   <div id="modalOverlay" class="modal-overlay">
    <div class="modal-content" id="modalContent">
     <div class="modal-header">
      <h2 id="modalTitle" style="margin: 0; font-size: 20px; color: white; flex: 1;"></h2><button class="modal-close" onclick="closeModal()"><i data-lucide="x" style="width: 20px; height: 20px;"></i></button>
     </div>
     <div id="modalBody" style="color: #aaa;"></div>
    </div>
   </div><!-- BOTTOM NAV -->
   <nav class="bottom-nav"><a href="#projects" class="nav-item active" data-section="projects"> <i data-lucide="layers" style="width: 18px; height: 18px;"></i> <span>프로젝트</span>
     <div class="nav-dot"></div></a> <a href="#contact" class="nav-item" data-section="contact"> <i data-lucide="send" style="width: 18px; height: 18px;"></i> <span>연락</span>
     <div class="nav-dot"></div></a>
   </nav>
  </div>
  <script>
    let projects = []; // 전역 변수로 선언

async function loadProjects() {
  try {
    const response = await fetch('projectsdata.json');
    projects = await response.json();
    renderProjects(); // 데이터를 다 받은 후 렌더링 시작
  } catch (error) {
    console.error("데이터를 불러오지 못했습니다:", error);
  }
}

loadProjects(); // 실행

    // Render projects
    function renderProjects(filter = 'all') {
      const grid = document.getElementById('projectGrid');
      const filtered = filter === 'all' ? projects : projects.filter(p => p.level.includes(filter));
      grid.innerHTML = '';

      filtered.forEach((p) => {
        const card = document.createElement('div');
        card.className = 'project-card';
        const badgeHtml = p.badge.map(b => `<span class="tag-pill">${b}</span>`).join('');
        const subjectText = p.subject.join('<br>');
        card.innerHTML = `
          <div class="card-inner" style="background: ${p.accentBg};">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 8px;">
              <div style="display: flex; gap: 6px; flex-wrap: wrap;">${badgeHtml}</div>
              <i data-lucide="arrow-up-right" style="width: 14px; height: 14px; color: #666; flex-shrink: 0;"></i>
            </div>
            <h3 style="color: white; font-weight: 600; font-size: 14px; margin: 0 0 4px; margin-bottom: 8px;">${p.title}</h3>
            <p style="color: ${p.accentFrom}; opacity: 0.8; font-size: 11px; margin: 0 0 12px; line-height: 1.4;">${subjectText}</p>
            <p style="color: #999; font-size: 11px; line-height: 1.5; margin: 0 0 12px;">${p.desc}</p>
            <div style="display: flex; align-items: center; gap: 6px; padding: 8px; border-radius: 8px; background: rgba(0,0,0,0.2); margin-bottom: 12px;">
              <i data-lucide="cpu" style="width: 12px; height: 12px; color: ${p.accentFrom};"></i>
              <span style="font-size: 9px; color: #999;">${p.ai}</span>
            </div>
            <div style="display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;">
              ${p.tags.map(t => `<span class="tag-pill" style="background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.08); color: #999; font-size: 9px;">#${t}</span>`).join('')}
            </div>
            <div class="button-group">
              <button class="btn-primary" onclick="openProjectLink(${p.id})"><i data-lucide="external-link" style="width: 14px; height: 14px;"></i>방문</button>
              <button class="btn-secondary" onclick="openProjectModal(${p.id})"><i data-lucide="book-open" style="width: 14px; height: 14px;"></i>자세히</button>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });

      lucide.createIcons();
    }

    // Open project link in new window
    function openProjectLink(projectId) {
      const project = projects.find(p => p.id === projectId);
      if (project && project.link) {
        window.open(project.link, '_blank', 'noopener,noreferrer');
      }
    }

    // Open project detail in modal
    function openProjectModal(projectId) {
      const project = projects.find(p => p.id === projectId);
      if (project) {
        document.getElementById('modalTitle').textContent = project.title;
        document.getElementById('modalBody').innerHTML = project.detailContent;
        document.getElementById('modalOverlay').classList.add('active');
        lucide.createIcons();
      }
    }

    // Close modal
    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    // Close modal when clicking outside
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) {
        closeModal();
      }
    });

    // Filter tabs
    document.getElementById('filterTabs').addEventListener('click', (e) => {
      const btn = e.target.closest('.filter-tab');
      if (!btn) return;

      document.querySelectorAll('.filter-tab').forEach(b => {
        b.classList.remove('active');
      });
      btn.classList.add('active');
      renderProjects(btn.dataset.filter);
    });

    // Bottom nav
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');

        // Scroll to section
        const section = item.dataset.section;
        const element = document.getElementById(section);
        if (element) {
          element.scrollIntoView({ behavior: 'smooth' });
        }
      });
    });

    // Element SDK
    const defaultConfig = {
      portfolio_title: 'AI × Education Lab',
      portfolio_subtitle: 'AI와 교육의 만남',
      contact_title: '함께 만들어요'
    };

    function applyConfig(config) {
      const c = { ...defaultConfig, ...config };
      const titleEl = document.getElementById('portfolioTitle');
      if (titleEl) {
        titleEl.innerHTML = 'AI × Education<br><span style="color: #63dcd2;">그쌤 Project</span>';
      }
      const contactTitleEl = document.getElementById('contactTitle');
      if (contactTitleEl) contactTitleEl.textContent = c.contact_title;
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: applyConfig,
        mapToCapabilities: (config) => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ['portfolio_title', config.portfolio_title || defaultConfig.portfolio_title],
          ['portfolio_subtitle', config.portfolio_subtitle || defaultConfig.portfolio_subtitle],
          ['contact_title', config.contact_title || defaultConfig.contact_title]
        ])
      });
    }

    // Initial render
    renderProjects();
    lucide.createIcons();
  </script>
