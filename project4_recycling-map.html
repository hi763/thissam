<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 동네 분리수거 지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f4f6f3; color: #222; }

  :root {
    --green: #1D9E75; --green-light: #E1F5EE; --green-dark: #085041;
    --amber: #BA7517; --amber-light: #FAEEDA;
    --blue: #185FA5; --blue-light: #E6F1FB;
    --red: #A32D2D; --red-light: #FCEBEB;
    --surface: #ffffff; --surface2: #f7f8f6;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.08);
    --text: #1a1a1a; --text2: #555; --text3: #999;
    --radius: 12px; --radius-sm: 8px;
  }

  /* ── Layout ── */
  .app-wrapper { max-width: 700px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

  .app-header {
    background: var(--green); color: #fff; padding: 16px 20px 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .app-header .logo { font-size: 22px; }
  .app-header h1 { font-size: 17px; font-weight: 600; line-height: 1.3; }
  .app-header p { font-size: 12px; opacity: 0.8; margin-top: 1px; }

  .tab-bar {
    display: flex; background: var(--surface); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 9000;
  }
  .tab-btn {
    flex: 1; padding: 13px 4px; font-size: 13px; font-weight: 600;
    border: none; background: transparent; color: var(--text2); cursor: pointer;
    border-bottom: 3px solid transparent; transition: all 0.18s;
  }
  .tab-btn.active { color: var(--green); border-bottom-color: var(--green); }

  .tab-panel { display: none; padding: 16px; flex: 1; }
  .tab-panel.active { display: block; }

  /* ── Map tab ── */
  .controls-card {
    background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border2);
    padding: 14px; margin-bottom: 14px;
  }
  .controls-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .controls-card select, .controls-card input {
    width: 100%; padding: 9px 11px; font-size: 13px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--surface2); color: var(--text);
    outline: none; font-family: inherit;
  }
  .controls-card select:focus, .controls-card input:focus { border-color: var(--green); }
  .add-pin-btn {
    width: 100%; padding: 11px; font-size: 13px; font-weight: 600;
    background: var(--green); color: #fff; border: none;
    border-radius: var(--radius-sm); cursor: pointer; transition: background 0.15s;
  }
  .add-pin-btn:hover { background: var(--green-dark); }
  .adding-mode .add-pin-btn { background: #e67e22; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:.7 } }

  #map { width: 100%; height: 400px; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; z-index: 1; }

  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

  .pin-list-section h3 { font-size: 14px; font-weight: 600; color: var(--text); margin: 14px 0 8px; }
  .pin-list { display: flex; flex-direction: column; gap: 6px; max-height: 220px; overflow-y: auto; }
  .pin-item {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 12px; border-radius: var(--radius-sm);
    background: var(--surface); border: 1px solid var(--border2); font-size: 13px;
  }
  .pin-item .place-name { font-weight: 500; flex: 1; }
  .cat-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
  .pin-item .cls-tag { font-size: 11px; color: var(--text3); white-space: nowrap; }

  /* ── Stats tab ── */
  .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 18px; }
  .stat-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border2); padding: 14px; text-align: center; }
  .stat-card .num { font-size: 26px; font-weight: 700; color: var(--green); }
  .stat-card .lbl { font-size: 11px; color: var(--text3); margin-top: 3px; }

  .chart-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border2); padding: 16px; margin-bottom: 14px; }
  .chart-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 14px; }
  .chart-wrap { position: relative; width: 100%; }
  .doughnut-row { display: flex; align-items: center; gap: 16px; }
  .cat-legend { display: flex; flex-direction: column; gap: 5px; font-size: 12px; color: var(--text2); }
  .cat-legend-item { display: flex; align-items: center; gap: 6px; }
  .cat-legend-sq { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* ── Quiz tab ── */
  .quiz-header { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border2); padding: 14px; margin-bottom: 14px; }
  .quiz-header-row { display: flex; justify-content: space-between; align-items: center; }
  .score-block .score-txt { font-size: 22px; font-weight: 700; color: var(--green); }
  .score-block .score-lbl { font-size: 11px; color: var(--text3); }
  .progress-bar-wrap { height: 6px; background: #e8ede8; border-radius: 3px; margin-top: 10px; }
  .progress-bar-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.4s ease; }

  .quiz-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border2); padding: 20px; }
  .quiz-q-num { font-size: 11px; color: var(--text3); margin-bottom: 10px; }
  .quiz-emoji { font-size: 44px; text-align: center; margin-bottom: 14px; }
  .quiz-question { font-size: 16px; font-weight: 600; line-height: 1.55; margin-bottom: 20px; color: var(--text); text-align: center; }
  .quiz-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .quiz-btn {
    padding: 16px; font-size: 20px; font-weight: 700;
    border-radius: var(--radius-sm); border: 2px solid var(--border);
    background: var(--surface2); cursor: pointer; transition: all 0.15s;
    color: var(--text);
  }
  .quiz-btn:hover:not(:disabled) { border-color: var(--green); background: var(--green-light); }
  .quiz-btn.correct { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; }
  .quiz-btn.wrong   { background: var(--red-light); border-color: #f44336; color: var(--red); }

  .quiz-feedback {
    padding: 12px 14px; border-radius: var(--radius-sm); font-size: 13px; line-height: 1.6;
    margin-bottom: 12px; display: none;
  }
  .quiz-feedback.visible { display: block; }
  .quiz-feedback.ok { background: var(--green-light); color: var(--green-dark); border-left: 3px solid var(--green); }
  .quiz-feedback.ng { background: var(--red-light); color: var(--red); border-left: 3px solid #f44336; }
  .quiz-next-btn {
    width: 100%; padding: 12px; font-size: 14px; font-weight: 600;
    background: var(--text); color: #fff; border: none;
    border-radius: var(--radius-sm); cursor: pointer; transition: opacity 0.15s;
  }
  .quiz-next-btn:hover { opacity: 0.85; }

  .quiz-result { text-align: center; padding: 30px 20px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border2); }
  .result-emoji { font-size: 56px; margin-bottom: 12px; }
  .result-score { font-size: 32px; font-weight: 700; color: var(--green); margin-bottom: 6px; }
  .result-msg { font-size: 14px; color: var(--text2); margin-bottom: 24px; line-height: 1.5; }
  .result-badges { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .result-badge { font-size: 12px; padding: 4px 12px; border-radius: 20px; font-weight: 600; }
  .badge-correct { background: #e8f5e9; color: #2e7d32; }
  .badge-wrong { background: var(--red-light); color: var(--red); }
  .quiz-restart-btn {
    padding: 12px 36px; font-size: 14px; font-weight: 600;
    background: var(--green); color: #fff; border: none;
    border-radius: var(--radius-sm); cursor: pointer; transition: background 0.15s;
  }
  .quiz-restart-btn:hover { background: var(--green-dark); }

  /* ── Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 99999; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--surface); border-radius: var(--radius); padding: 22px;
    width: 100%; max-width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  .modal-box h3 { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .modal-loc { font-size: 12px; color: var(--text3); margin-bottom: 14px; }
  .modal-box input, .modal-box select {
    width: 100%; padding: 10px 12px; font-size: 13px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface2); color: var(--text); margin-bottom: 9px;
    font-family: inherit; outline: none;
  }
  .modal-box input:focus, .modal-box select:focus { border-color: var(--green); }
  .modal-btns { display: flex; gap: 8px; margin-top: 4px; }
  .modal-btns button { flex: 1; padding: 11px; font-size: 13px; font-weight: 600; border-radius: var(--radius-sm); cursor: pointer; font-family: inherit; border: 1px solid var(--border); }
  .modal-btns .btn-cancel { background: var(--surface2); color: var(--text2); }
  .modal-btns .btn-confirm { background: var(--green); color: #fff; border-color: var(--green); }

  /* Leaflet popup tweak */
  .leaflet-popup-content { font-family: inherit; font-size: 13px; line-height: 1.5; min-width: 140px; }
  .popup-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
  .popup-meta { color: #666; font-size: 12px; }
  .popup-cat { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; margin-top: 4px; }

  @media (max-width: 480px) {
    .stats-grid { grid-template-columns: repeat(3,1fr); }
    .doughnut-row { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="app-wrapper">

  <div class="app-header">
    <div class="logo">♻️</div>
    <div>
      <h1>우리 동네 분리수거 지도</h1>
      <p>학생들이 함께 만드는 재활용 현황 지도</p>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('map')">🗺 지도 등록</button>
    <button class="tab-btn" onclick="switchTab('stats')">📊 반별 통계</button>
    <button class="tab-btn" onclick="switchTab('quiz')">❓ OX 퀴즈</button>
  </div>

  <!-- MAP TAB -->
  <div class="tab-panel active" id="tab-map">
    <div class="controls-card">
      <div class="controls-row">
        <select id="class-select">
          <option value="">반 선택</option>
          <option>1반</option><option>2반</option><option>3반</option>
          <option>4반</option><option>5반</option><option>6반</option>
        </select>
        <select id="cat-select">
          <option value="">항목 선택</option>
          <option value="paper">📄 종이류</option>
          <option value="plastic">🧴 플라스틱</option>
          <option value="glass">🫙 유리</option>
          <option value="metal">🥫 금속캔</option>
          <option value="styrofoam">📦 스티로폼</option>
          <option value="vinyl">🛍 비닐</option>
        </select>
      </div>
      <button class="add-pin-btn" id="add-pin-btn" onclick="startAddPin()">
        + 지도를 클릭해서 분리수거 위치 등록하기
      </button>
    </div>

    <div id="map"></div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#2196F3"></div>종이류</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4CAF50"></div>플라스틱</div>
      <div class="legend-item"><div class="legend-dot" style="background:#9C27B0"></div>유리</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FF9800"></div>금속캔</div>
      <div class="legend-item"><div class="legend-dot" style="background:#F44336"></div>스티로폼</div>
      <div class="legend-item"><div class="legend-dot" style="background:#00BCD4"></div>비닐</div>
    </div>

    <div class="pin-list-section">
      <h3>등록된 위치 목록 (<span id="pin-count">0</span>개)</h3>
      <div class="pin-list" id="pin-list"></div>
    </div>
  </div>

  <!-- STATS TAB -->
  <div class="tab-panel" id="tab-stats">
    <div class="stats-grid">
      <div class="stat-card"><div class="num" id="stat-total">0</div><div class="lbl">총 등록 수</div></div>
      <div class="stat-card"><div class="num" id="stat-classes">0</div><div class="lbl">참여 반</div></div>
      <div class="stat-card"><div class="num" id="stat-types">0</div><div class="lbl">항목 종류</div></div>
    </div>
    <div class="chart-card">
      <h3>반별 분리수거 등록 현황</h3>
      <div class="chart-wrap" style="height:200px"><canvas id="classChart"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>항목별 비율</h3>
      <div class="doughnut-row">
        <div class="chart-wrap" style="height:200px;flex:1;min-width:0"><canvas id="catChart"></canvas></div>
        <div class="cat-legend" id="cat-legend"></div>
      </div>
    </div>
  </div>

  <!-- QUIZ TAB -->
  <div class="tab-panel" id="tab-quiz">
    <div class="quiz-header">
      <div class="quiz-header-row">
        <div class="score-block">
          <div class="score-lbl">현재 점수</div>
          <div class="score-txt" id="q-score">0점</div>
        </div>
        <div class="score-block" style="text-align:right">
          <div class="score-lbl">진행</div>
          <div class="score-txt" id="q-progress">0 / 10</div>
        </div>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="q-bar" style="width:0%"></div></div>
    </div>
    <div id="quiz-area"></div>
  </div>

</div><!-- app-wrapper -->

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <h3>분리수거 위치 등록</h3>
    <div class="modal-loc" id="modal-loc"></div>
    <input type="text" id="modal-name" placeholder="장소 이름 (예: 학교 앞 편의점)">
    <select id="modal-class">
      <option value="">반 선택</option>
      <option>1반</option><option>2반</option><option>3반</option>
      <option>4반</option><option>5반</option><option>6반</option>
    </select>
    <select id="modal-cat">
      <option value="">항목 선택</option>
      <option value="paper">📄 종이류</option>
      <option value="plastic">🧴 플라스틱</option>
      <option value="glass">🫙 유리</option>
      <option value="metal">🥫 금속캔</option>
      <option value="styrofoam">📦 스티로폼</option>
      <option value="vinyl">🛍 비닐</option>
    </select>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-confirm" onclick="confirmPin()">등록하기</button>
    </div>
  </div>
</div>

<script>
const CAT = {
  paper:     { label: '종이류',   color: '#2196F3', light: '#E3F2FD', dark: '#0D47A1', emoji: '📄' },
  plastic:   { label: '플라스틱', color: '#4CAF50', light: '#E8F5E9', dark: '#1B5E20', emoji: '🧴' },
  glass:     { label: '유리',     color: '#9C27B0', light: '#F3E5F5', dark: '#4A148C', emoji: '🫙' },
  metal:     { label: '금속캔',   color: '#FF9800', light: '#FFF3E0', dark: '#E65100', emoji: '🥫' },
  styrofoam: { label: '스티로폼', color: '#F44336', light: '#FFEBEE', dark: '#B71C1C', emoji: '📦' },
  vinyl:     { label: '비닐',     color: '#00BCD4', light: '#E0F7FA', dark: '#006064', emoji: '🛍' },
};

let pins = [
  { lat: 36.6425, lng: 127.4892, name: '학교 정문 앞', cls: '1반', cat: 'paper' },
  { lat: 36.6440, lng: 127.4920, name: '중앙공원 입구', cls: '2반', cat: 'plastic' },
  { lat: 36.6410, lng: 127.4870, name: '마트 앞 분리수거함', cls: '3반', cat: 'glass' },
  { lat: 36.6455, lng: 127.4905, name: '버스정류장 옆', cls: '1반', cat: 'metal' },
  { lat: 36.6430, lng: 127.4855, name: '아파트 단지 내', cls: '4반', cat: 'vinyl' },
  { lat: 36.6415, lng: 127.4935, name: '도서관 주변', cls: '2반', cat: 'styrofoam' },
];

let map = null, addingPin = false, pendingLat = 0, pendingLng = 0;
let classChartInst = null, catChartInst = null;
const mapMarkers = [];

// ── TAB ──────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) =>
    b.classList.toggle('active', ['map','stats','quiz'][i] === name));
  document.querySelectorAll('.tab-panel').forEach(p =>
    p.classList.toggle('active', p.id === 'tab-' + name));
  if (name === 'map')   { if (!map) initMap(); else map.invalidateSize(); }
  if (name === 'stats') renderStats();
}

// ── MAP ──────────────────────────────────────────────
function initMap() {
  map = L.map('map', { zoomControl: true }).setView([36.643, 127.490], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(map);
  pins.forEach(p => addMarker(p));
  map.on('click', onMapClick);
  renderPinList();
}

function makeIcon(cat) {
  const c = CAT[cat];
  return L.divIcon({
    className: '',
    html: `<div style="
      width:34px;height:34px;border-radius:50% 50% 50% 0;
      background:${c.color};border:3px solid #fff;
      transform:rotate(-45deg);
      box-shadow:0 2px 6px rgba(0,0,0,0.3);
      display:flex;align-items:center;justify-content:center;">
      <span style="transform:rotate(45deg);font-size:14px;line-height:1">${c.emoji}</span>
    </div>`,
    iconSize: [34, 34],
    iconAnchor: [17, 34],
    popupAnchor: [0, -36]
  });
}

function addMarker(pin) {
  const c = CAT[pin.cat];
  const marker = L.marker([pin.lat, pin.lng], { icon: makeIcon(pin.cat) }).addTo(map);
  marker.bindPopup(`
    <div class="popup-title">${pin.name}</div>
    <div class="popup-meta">${pin.cls}</div>
    <span class="popup-cat" style="background:${c.light};color:${c.dark}">${c.emoji} ${c.label}</span>
  `);
  mapMarkers.push(marker);
}

function startAddPin() {
  const cls = document.getElementById('class-select').value;
  const cat = document.getElementById('cat-select').value;
  if (!cls || !cat) { alert('반과 분리수거 항목을 먼저 선택해주세요!'); return; }
  if (addingPin) { addingPin = false; resetAddBtn(); return; }
  addingPin = true;
  const btn = document.getElementById('add-pin-btn');
  btn.textContent = '📍 지도를 클릭하여 위치를 선택하세요 (다시 클릭하면 취소)';
  btn.style.background = '#e67e22';
  document.getElementById('map').style.cursor = 'crosshair';
}

function resetAddBtn() {
  const btn = document.getElementById('add-pin-btn');
  btn.textContent = '+ 지도를 클릭해서 분리수거 위치 등록하기';
  btn.style.background = '';
  document.getElementById('map').style.cursor = '';
}

function onMapClick(e) {
  if (!addingPin) return;
  addingPin = false;
  resetAddBtn();
  pendingLat = e.latlng.lat;
  pendingLng = e.latlng.lng;
  document.getElementById('modal-loc').textContent =
    `위도 ${pendingLat.toFixed(5)}, 경도 ${pendingLng.toFixed(5)}`;
  const cls = document.getElementById('class-select').value;
  const cat = document.getElementById('cat-select').value;
  document.getElementById('modal-class').value = cls;
  document.getElementById('modal-cat').value = cat;
  document.getElementById('modal-name').value = '';
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function confirmPin() {
  const name = document.getElementById('modal-name').value.trim() || '분리수거 장소';
  const cls  = document.getElementById('modal-class').value;
  const cat  = document.getElementById('modal-cat').value;
  if (!cls || !cat) { alert('반과 항목을 선택해주세요'); return; }
  const pin = { lat: pendingLat, lng: pendingLng, name, cls, cat };
  pins.push(pin);
  addMarker(pin);
  renderPinList();
  closeModal();
}

function renderPinList() {
  const list = document.getElementById('pin-list');
  document.getElementById('pin-count').textContent = pins.length;
  list.innerHTML = [...pins].reverse().map(p => {
    const c = CAT[p.cat];
    return `<div class="pin-item">
      <span style="font-size:18px">${c.emoji}</span>
      <span class="place-name">${p.name}</span>
      <span class="cat-badge" style="background:${c.light};color:${c.dark}">${c.label}</span>
      <span class="cls-tag">${p.cls}</span>
    </div>`;
  }).join('');
}

// ── STATS ─────────────────────────────────────────────
function renderStats() {
  document.getElementById('stat-total').textContent = pins.length;
  document.getElementById('stat-classes').textContent = new Set(pins.map(p=>p.cls)).size;
  document.getElementById('stat-types').textContent   = new Set(pins.map(p=>p.cat)).size;

  const allCls  = ['1반','2반','3반','4반','5반','6반'];
  const clsData = allCls.map(c => pins.filter(p => p.cls === c).length);
  const catKeys  = Object.keys(CAT);
  const catData  = catKeys.map(k => pins.filter(p => p.cat === k).length);
  const catColors = catKeys.map(k => CAT[k].color);

  if (classChartInst) classChartInst.destroy();
  classChartInst = new Chart(document.getElementById('classChart'), {
    type: 'bar',
    data: {
      labels: allCls,
      datasets: [{
        data: clsData,
        backgroundColor: clsData.map((v,i) => i%2===0 ? '#1D9E75' : '#5DCAA5'),
        borderRadius: 6, borderSkipped: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { stepSize: 1, font:{size:11} }, grid: { color: 'rgba(0,0,0,0.06)' } },
        x: { ticks: { font:{size:12} }, grid: { display:false } }
      }
    }
  });

  if (catChartInst) catChartInst.destroy();
  catChartInst = new Chart(document.getElementById('catChart'), {
    type: 'doughnut',
    data: {
      labels: catKeys.map(k => CAT[k].label),
      datasets: [{ data: catData, backgroundColor: catColors, borderWidth: 3, borderColor: '#fff' }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      cutout: '60%'
    }
  });

  document.getElementById('cat-legend').innerHTML = catKeys.map((k,i) =>
    `<div class="cat-legend-item">
      <span class="cat-legend-sq" style="background:${CAT[k].color}"></span>
      ${CAT[k].label} (${catData[i]})
    </div>`
  ).join('');
}

// ── QUIZ ─────────────────────────────────────────────
const QUIZ_ALL = [
  { emoji:'📰', question:'신문지는 종이류로 분리수거 할 수 있다', answer:true,  hint:'신문지는 깨끗한 상태라면 종이류로 배출해요. 다른 재질이 섞이지 않도록 주의하세요!' },
  { emoji:'🍕', question:'기름에 오염된 피자 박스도 종이류로 재활용 가능하다', answer:false, hint:'기름이 배어든 종이는 재활용이 어려워요. 음식물이 묻은 경우 일반 쓰레기로 버려야 해요.' },
  { emoji:'🍶', question:'내용물을 비우고 라벨을 제거한 페트병은 재활용 가능하다', answer:true, hint:'페트병은 내용물을 비우고 라벨을 떼고 찌그러뜨려 플라스틱류로 배출하면 돼요!' },
  { emoji:'💡', question:'다 쓴 형광등은 일반 쓰레기로 버릴 수 있다', answer:false, hint:'형광등에는 수은이 들어 있어 전용 수거함에 버려야 해요. 슈퍼마켓이나 주민센터를 이용하세요.' },
  { emoji:'🫙', question:'스프레이 캔은 내용물을 다 쓴 후 금속류로 분리수거 가능하다', answer:true, hint:'내용물을 완전히 비우고 가스를 뺀 뒤 금속캔으로 배출할 수 있어요.' },
  { emoji:'🛍', question:'일회용 비닐봉지는 비닐류로 분리수거 가능하다', answer:true, hint:'이물질을 제거하고 내용물을 비운 비닐봉지는 비닐류로 재활용 가능해요.' },
  { emoji:'🧾', question:'영수증 용지는 종이류로 분리수거 가능하다', answer:false, hint:'영수증은 열감지 특수 코팅지라 재활용이 어려워요. 일반 쓰레기로 버려야 해요.' },
  { emoji:'🍜', question:'깨끗이 씻은 스티로폼 컵라면 용기는 재활용 가능하다', answer:true, hint:'깨끗하게 세척한 스티로폼은 스티로폼류로 분리수거해요. 음식물이 남아있으면 안 돼요!' },
  { emoji:'🥂', question:'깨진 유리컵은 유리류 분리수거함에 버릴 수 있다', answer:false, hint:'깨진 유리는 안전을 위해 신문지로 감싸 일반 쓰레기로 버려요. 재활용은 깨지지 않은 유리만 가능해요.' },
  { emoji:'🥤', question:'알루미늄 음료캔은 헹궈서 금속캔으로 재활용 가능하다', answer:true, hint:'알루미늄 캔은 재활용 가치가 높아요! 헹군 후 납작하게 찌그러뜨려 배출하세요.' },
  { emoji:'☕', question:'종이컵은 종이류로 분리수거 가능하다', answer:false, hint:'종이컵 내부에는 방수 코팅(PE)이 되어 있어 일반 종이와 다르게 처리돼요. 종이팩 수거함에 별도 배출하거나 일반 쓰레기로 버려요.' },
  { emoji:'🪫', question:'다 쓴 건전지는 일반 쓰레기로 버릴 수 있다', answer:false, hint:'건전지에는 중금속이 포함되어 있어 전용 수거함에 버려야 해요. 마트나 편의점에 수거함이 있어요.' },
];

let qList = [], qIdx = 0, qScore = 0, qAnswered = false, qCorrectCount = 0;

function initQuiz() {
  qList = [...QUIZ_ALL].sort(() => Math.random() - 0.5).slice(0, 10);
  qIdx = 0; qScore = 0; qAnswered = false; qCorrectCount = 0;
  updateQuizHeader();
  renderQuestion();
}

function updateQuizHeader() {
  document.getElementById('q-score').textContent = qScore + '점';
  document.getElementById('q-progress').textContent = qIdx + ' / 10';
  document.getElementById('q-bar').style.width = (qIdx / 10 * 100) + '%';
}

function renderQuestion() {
  const area = document.getElementById('quiz-area');
  if (qIdx >= 10) {
    const pct = qScore;
    const face  = pct >= 80 ? '🌍' : pct >= 60 ? '♻️' : '📚';
    const msg   = pct >= 90 ? '완벽해요! 진정한 환경 지킴이입니다!' :
                  pct >= 70 ? '잘했어요! 조금만 더 공부하면 만점이에요.' :
                  pct >= 50 ? '절반은 맞혔어요. 분리수거 규칙을 다시 살펴봐요.' :
                              '아직 어렵나요? 포기하지 말고 다시 도전해봐요!';
    area.innerHTML = `
      <div class="quiz-result">
        <div class="result-emoji">${face}</div>
        <div class="result-score">${qScore}점 / 100점</div>
        <div class="result-badges">
          <span class="result-badge badge-correct">✔ 정답 ${qCorrectCount}개</span>
          <span class="result-badge badge-wrong">✘ 오답 ${10 - qCorrectCount}개</span>
        </div>
        <div class="result-msg">${msg}</div>
        <button class="quiz-restart-btn" onclick="initQuiz()">🔄 다시 풀기</button>
      </div>`;
    return;
  }
  const q = qList[qIdx];
  area.innerHTML = `
    <div class="quiz-card">
      <div class="quiz-q-num">문제 ${qIdx + 1} / 10</div>
      <div class="quiz-emoji">${q.emoji}</div>
      <div class="quiz-question">${q.question}</div>
      <div class="quiz-btns">
        <button class="quiz-btn" id="btn-o" onclick="answerQuiz(true)">⭕ 맞다</button>
        <button class="quiz-btn" id="btn-x" onclick="answerQuiz(false)">❌ 틀리다</button>
      </div>
      <div class="quiz-feedback" id="quiz-feedback"></div>
      <button class="quiz-next-btn" id="quiz-next" style="display:none" onclick="nextQuestion()">
        ${qIdx < 9 ? '다음 문제 →' : '결과 보기'}
      </button>
    </div>`;
}

function answerQuiz(ans) {
  if (qAnswered) return;
  qAnswered = true;
  const q = qList[qIdx];
  const correct = ans === q.answer;
  if (correct) { qScore += 10; qCorrectCount++; }

  document.getElementById('btn-o').disabled = true;
  document.getElementById('btn-x').disabled = true;

  if (q.answer === true)  document.getElementById('btn-o').classList.add('correct');
  else                    document.getElementById('btn-x').classList.add('correct');
  if (!correct) {
    if (ans === true)  document.getElementById('btn-o').classList.add('wrong');
    else               document.getElementById('btn-x').classList.add('wrong');
  }

  const fb = document.getElementById('quiz-feedback');
  fb.className = 'quiz-feedback visible ' + (correct ? 'ok' : 'ng');
  fb.textContent = (correct ? '✔ 정답! ' : '✘ 오답! ') + q.hint;

  document.getElementById('quiz-next').style.display = 'block';
  qIdx++;
  updateQuizHeader();
}

function nextQuestion() {
  qAnswered = false;
  renderQuestion();
}

// ── INIT ──────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  initMap();
  initQuiz();
});
