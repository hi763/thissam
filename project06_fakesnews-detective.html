<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가짜뉴스 탐정단 — 미디어 리터러시 훈련소</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      font-family: 'Pretendard', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      color: #fff;
      padding-bottom: 4rem;
    }

    #app { max-width: 680px; margin: 0 auto; padding: 0 1.25rem; }

    /* Header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.5rem 0 1rem;
      border-bottom: 1px solid #1e1e2e;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 32px; height: 32px; background: #f0f; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-text { font-size: 16px; font-weight: 800; letter-spacing: -0.5px; }
    .progress-dots { display: flex; gap: 4px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #2a2a3a; transition: background 0.3s; }
    .dot.done { background: #22c55e; }
    .dot.current { background: #f0f; }

    /* News Card */
    .news-card {
      margin-top: 1.5rem; background: #111118;
      border: 1px solid #1e1e2e; border-radius: 16px; overflow: hidden;
    }
    .source-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 18px; background: #13131e; border-bottom: 1px solid #1e1e2e;
    }
    .source-left { display: flex; align-items: center; gap: 10px; }
    .source-logo {
      width: 30px; height: 30px; border-radius: 6px; background: #1e1e2e;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800; color: #888; letter-spacing: 0.5px;
    }
    .source-name { font-size: 13px; font-weight: 600; color: #ccc; }
    .source-date { font-size: 11px; color: #555; margin-top: 1px; }
    .diff-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
    .diff-low  { background: #dcfce7; color: #166534; }
    .diff-mid  { background: #fef9c3; color: #854d0e; }
    .diff-high { background: #fee2e2; color: #991b1b; }

    .news-body { padding: 1.25rem 1.25rem 0.75rem; }
    .news-headline {
      font-size: 18px; font-weight: 800; color: #fff;
      line-height: 1.4; margin-bottom: 12px; letter-spacing: -0.3px;
    }
    .news-text { font-size: 14px; color: #888; line-height: 1.75; }
    .news-text mark { background: #fbbf24; color: #1a1a1a; border-radius: 3px; padding: 0 2px; }

    .clue-section { padding: 0 1.25rem 1rem; }
    .clue-toggle {
      font-size: 12px; color: #555; background: none;
      border: 1px solid #2a2a3a; border-radius: 8px;
      padding: 6px 12px; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
    }
    .clue-toggle:hover { color: #888; border-color: #3a3a4a; }
    .clue-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .clue-pill {
      font-size: 12px; padding: 5px 12px; border-radius: 20px;
      cursor: pointer; border: 1px solid #2a2a3a;
      background: #1a1a24; color: #777; font-weight: 600; transition: all 0.15s;
    }
    .clue-pill.active { border-color: #fbbf24; background: #2a2000; color: #fbbf24; }

    /* Verdict phase */
    .verdict-label {
      font-size: 13px; color: #555; margin-bottom: 12px;
      text-align: center; margin-top: 1.5rem;
    }
    .verdict-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .verdict-btn { border-radius: 14px; padding: 20px; cursor: pointer; transition: all 0.15s; text-align: center; }
    .verdict-btn.real { background: #0d2d1a; border: 1.5px solid #22c55e33; }
    .verdict-btn.real:hover { border-color: #22c55e; }
    .verdict-btn.fake { background: #2d0d0d; border: 1.5px solid #ef444433; }
    .verdict-btn.fake:hover { border-color: #ef4444; }
    .verdict-icon { font-size: 28px; margin-bottom: 6px; }
    .verdict-title { font-size: 16px; font-weight: 800; }
    .verdict-btn.real .verdict-title { color: #86efac; }
    .verdict-btn.fake .verdict-title { color: #fca5a5; }
    .verdict-sub { font-size: 12px; margin-top: 4px; }
    .verdict-btn.real .verdict-sub { color: rgba(74,222,128,.67); }
    .verdict-btn.fake .verdict-sub { color: rgba(248,113,113,.67); }

    /* Reasoning phase */
    .phase-box { margin-top: 1.5rem; }
    .verdict-indicator { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .verdict-chip {
      width: 24px; height: 24px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800;
    }
    .verdict-chip.real { background: rgba(34,197,94,.13); color: #86efac; }
    .verdict-chip.fake { background: rgba(239,68,68,.13); color: #fca5a5; }
    .verdict-label-sm { font-size: 13px; color: #888; }

    .reasoning-box {
      background: #111118; border: 1px solid #1e1e2e; border-radius: 14px; overflow: hidden;
    }
    .reasoning-header { padding: 10px 14px; border-bottom: 1px solid #1e1e2e; font-size: 12px; color: #555; }
    #reasoning-input {
      width: 100%; min-height: 120px;
      background: transparent; border: none; outline: none;
      padding: 14px; font-size: 14px; color: #ddd;
      line-height: 1.7; resize: none; font-family: inherit;
    }
    #reasoning-input::placeholder { color: #333; }
    .reasoning-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px; border-top: 1px solid #1e1e2e;
    }
    #char-count { font-size: 12px; color: #555; transition: color 0.2s; }
    #char-count.ready { color: #22c55e; }
    #submit-btn {
      background: #1e1e2e; color: #444; border: none;
      border-radius: 8px; padding: 8px 20px;
      font-size: 13px; font-weight: 700; cursor: not-allowed; transition: all 0.2s;
    }
    #submit-btn.ready { background: #f0f; color: #fff; cursor: pointer; }
    #submit-btn.ready:hover { background: #d400d4; }

    /* Feedback phase */
    .result-banner {
      border-radius: 12px; padding: 14px 18px;
      margin-bottom: 14px; display: flex; align-items: flex-start; gap: 12px;
    }
    .result-banner.correct { background: #0d2d1a; border: 1px solid rgba(34,197,94,.27); }
    .result-banner.wrong   { background: #2d0d0d; border: 1px solid rgba(239,68,68,.27); }
    .result-icon { font-size: 22px; flex-shrink: 0; }
    .result-title { font-size: 14px; font-weight: 700; }
    .result-banner.correct .result-title { color: #86efac; }
    .result-banner.wrong   .result-title { color: #fca5a5; }
    .result-explanation { font-size: 12px; color: #888; margin-top: 3px; line-height: 1.5; }

    /* Static feedback card */
    .feedback-card {
      background: #0d0d1a; border: 1px solid #2a2a4a; border-radius: 14px; overflow: hidden;
    }
    .feedback-card-header {
      padding: 10px 16px; background: #13132a;
      border-bottom: 1px solid #2a2a4a;
      display: flex; align-items: center; gap: 8px;
    }
    .feedback-icon-box {
      width: 20px; height: 20px; background: #7c3aed; border-radius: 5px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .feedback-header-text { font-size: 12px; font-weight: 700; color: #a78bfa; }
    .feedback-card-body { padding: 1rem 1.25rem; }
    .feedback-item { margin-bottom: 14px; }
    .feedback-item:last-child { margin-bottom: 0; }
    .feedback-label {
      font-size: 11px; font-weight: 700; color: #a78bfa;
      margin-bottom: 4px; display: flex; align-items: center; gap: 5px;
    }
    .feedback-label-dot {
      width: 5px; height: 5px; border-radius: 50%; background: #7c3aed; flex-shrink: 0;
    }
    .feedback-content { font-size: 13px; color: #bbb; line-height: 1.75; }

    /* Good/bad example tabs */
    .example-tabs { display: flex; gap: 6px; margin-top: 10px; margin-bottom: 6px; }
    .ex-tab {
      font-size: 11px; padding: 4px 10px; border-radius: 6px;
      border: 1px solid #2a2a4a; background: #1a1a2e;
      color: #666; cursor: pointer; transition: all 0.15s;
    }
    .ex-tab.good-active { border-color: #22c55e55; background: #0d2d1a; color: #86efac; }
    .ex-tab.bad-active  { border-color: #ef444455; background: #2d0d0d; color: #fca5a5; }
    .ex-content {
      font-size: 12px; line-height: 1.7; padding: 10px 12px;
      border-radius: 8px; display: none;
    }
    .ex-content.good { background: #0a1f12; border: 1px solid #22c55e22; color: #86efac; }
    .ex-content.bad  { background: #1f0a0a; border: 1px solid #ef444422; color: #fca5a5; }
    .ex-content.visible { display: block; }

    #next-btn {
      width: 100%; margin-top: 14px; background: #f0f; border: none;
      border-radius: 12px; padding: 15px; font-size: 15px;
      font-weight: 800; color: #fff; cursor: pointer; letter-spacing: -0.3px;
      transition: background 0.15s;
    }
    #next-btn:hover { background: #d400d4; }

    /* Result screen */
    #result-screen {
      min-height: 100vh; display: none; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 2rem; max-width: 520px; margin: 0 auto;
    }
    .grade-display {
      font-size: 80px; font-weight: 800; color: #f0f;
      letter-spacing: -4px; line-height: 1;
      text-shadow: 0 0 40px rgba(255,0,255,.38);
    }
    .score-text { font-size: 22px; font-weight: 700; margin: 16px 0 8px; }
    .grade-msg { font-size: 15px; color: #aaa; margin-bottom: 40px; }
    .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-bottom: 32px; }
    .score-item { border-radius: 12px; padding: 12px 14px; text-align: left; }
    .score-item.correct { background: #0d2d1a; border: 1px solid rgba(34,197,94,.2); }
    .score-item.wrong   { background: #2d0d0d; border: 1px solid rgba(239,68,68,.2); }
    .score-item-label { font-size: 11px; font-weight: 600; margin-bottom: 4px; }
    .score-item.correct .score-item-label { color: #86efac; }
    .score-item.wrong   .score-item-label { color: #fca5a5; }
    .score-item-headline { font-size: 12px; color: #ccc; line-height: 1.5; }
    #restart-btn {
      background: #f0f; color: #fff; border: none;
      border-radius: 10px; padding: 14px 36px;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
    #restart-btn:hover { background: #d400d4; }

    @media (max-width: 480px) {
      .score-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Result screen -->
<div id="result-screen">
  <div class="grade-display" id="grade-letter">A</div>
  <div class="score-text" id="score-text"></div>
  <div class="grade-msg" id="grade-msg"></div>
  <div class="score-grid" id="score-grid"></div>
  <button id="restart-btn" onclick="restart()">다시 도전</button>
</div>

<!-- Main app -->
<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="logo-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </div>
      <span class="logo-text">가짜뉴스 탐정단</span>
    </div>
    <div class="progress-dots" id="progress-dots"></div>
  </div>

  <!-- News Card -->
  <div class="news-card">
    <div class="source-bar">
      <div class="source-left">
        <div class="source-logo" id="news-logo"></div>
        <div>
          <div class="source-name" id="news-source"></div>
          <div class="source-date" id="news-date"></div>
        </div>
      </div>
      <div class="diff-badge" id="diff-badge"></div>
    </div>
    <div class="news-body">
      <div class="news-headline" id="news-headline"></div>
      <div class="news-text" id="news-body-text"></div>
    </div>
    <div class="clue-section">
      <button class="clue-toggle" onclick="toggleClues()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>
        </svg>
        <span id="clue-toggle-label">단서 힌트 보기</span>
      </button>
      <div class="clue-pills" id="clue-pills" style="display:none;"></div>
    </div>
  </div>

  <!-- Phase: Verdict -->
  <div id="phase-verdict">
    <div class="verdict-label">이 뉴스는 진짜일까요, 가짜일까요?</div>
    <div class="verdict-grid">
      <button class="verdict-btn real" onclick="selectVerdict('real')">
        <div class="verdict-icon">✓</div>
        <div class="verdict-title">진짜 뉴스</div>
        <div class="verdict-sub">사실에 근거한 보도</div>
      </button>
      <button class="verdict-btn fake" onclick="selectVerdict('fake')">
        <div class="verdict-icon">✗</div>
        <div class="verdict-title">가짜 뉴스</div>
        <div class="verdict-sub">허위·과장된 정보</div>
      </button>
    </div>
  </div>

  <!-- Phase: Reasoning -->
  <div id="phase-reasoning" style="display:none;" class="phase-box">
    <div class="verdict-indicator">
      <div class="verdict-chip" id="verdict-chip"></div>
      <span class="verdict-label-sm" id="verdict-label-sm"></span>
    </div>
    <div class="reasoning-box">
      <div class="reasoning-header">판별 근거를 작성하세요 (20자 이상)</div>
      <textarea id="reasoning-input"
        placeholder="왜 그렇게 생각했나요? 기사의 어떤 부분이 의심스럽거나 신뢰할 수 있다고 느꼈나요?"
        oninput="onReasoningInput()"></textarea>
      <div class="reasoning-footer">
        <span id="char-count">0자</span>
        <button id="submit-btn" onclick="submitReasoning()" disabled>피드백 확인하기</button>
      </div>
    </div>
  </div>

  <!-- Phase: Feedback -->
  <div id="phase-feedback" style="display:none;" class="phase-box">
    <!-- 정답/오답 배너 -->
    <div class="result-banner" id="result-banner">
      <div class="result-icon" id="result-icon"></div>
      <div>
        <div class="result-title" id="result-title"></div>
        <div class="result-explanation" id="result-explanation"></div>
      </div>
    </div>

    <!-- 맞춤 피드백 카드 -->
    <div class="feedback-card">
      <div class="feedback-card-header">
        <div class="feedback-icon-box">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="#fff">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
          </svg>
        </div>
        <span class="feedback-header-text">논증 피드백 가이드</span>
      </div>
      <div class="feedback-card-body">

        <div class="feedback-item">
          <div class="feedback-label">
            <div class="feedback-label-dot"></div>
            이 기사의 핵심 판별 포인트
          </div>
          <div class="feedback-content" id="fb-point"></div>
        </div>

        <div class="feedback-item">
          <div class="feedback-label">
            <div class="feedback-label-dot"></div>
            근거 작성 예시 비교
          </div>
          <div class="example-tabs">
            <button class="ex-tab" id="tab-good" onclick="showExample('good')">✓ 좋은 근거 예시</button>
            <button class="ex-tab" id="tab-bad"  onclick="showExample('bad')">✗ 아쉬운 근거 예시</button>
          </div>
          <div class="ex-content good" id="ex-good"></div>
          <div class="ex-content bad"  id="ex-bad"></div>
        </div>

        <div class="feedback-item">
          <div class="feedback-label">
            <div class="feedback-label-dot"></div>
            팩트체크 방법
          </div>
          <div class="feedback-content" id="fb-factcheck"></div>
        </div>

        <div class="feedback-item" style="background:#13132a; border-radius:10px; padding:12px 14px;">
          <div class="feedback-label" style="margin-bottom:5px;">
            <div class="feedback-label-dot"></div>
            미디어 리터러시 한 줄 팁
          </div>
          <div class="feedback-content" style="color:#c4b5fd;" id="fb-tip"></div>
        </div>

      </div>
    </div>

    <button id="next-btn" onclick="nextNews()">다음 기사</button>
  </div>
</div>

<script>
const NEWS_DATA = [
  {
    id: 1,
    headline: "서울시, 2027년부터 대중교통 전면 무료화 추진 확정",
    source: "서울뉴스타임", date: "2026.04.08", logo: "SN",
    body: "서울시는 8일 시의회 본회의에서 대중교통 무료화 조례안을 통과시켰다고 발표했다. 오세훈 시장은 \"시민 교통비 부담을 완전히 없애겠다\"고 밝혔으며, 연간 소요 예산은 약 2조 3천억 원으로 추산된다. 해당 정책은 2027년 1월 1일부터 지하철·버스 전 노선에 적용될 예정이다.",
    clues: ["확정", "조례안을 통과", "오세훈 시장은"],
    isReal: false, difficulty: "중",
    explanation: "실제로 서울시는 이런 정책을 확정·발표한 적이 없습니다. 출처 매체 '서울뉴스타임'은 공식 언론사가 아니며, 구체적인 예산 수치가 신뢰성 있는 출처 없이 제시되어 있습니다.",
    feedback: {
      point: "① 출처 '서울뉴스타임'이 공식 언론사인지 확인이 필요합니다. ② '확정'이라는 강한 단어를 사용했지만 서울시 공식 홈페이지나 주요 언론에서 같은 내용을 찾을 수 없습니다. ③ 연간 2조 3천억 원이라는 구체적인 수치가 출처 없이 제시된 점도 의심 신호입니다.",
      goodExample: "\"'서울뉴스타임'을 검색해봤더니 서울시 공식 보도자료 목록에 없는 매체였습니다. 또한 이 정도 규모의 정책이라면 KBS·MBC·연합뉴스 등에서도 보도됐을 텐데 관련 기사를 찾을 수 없어서 가짜뉴스라고 판단했습니다.\"",
      badExample: "\"왠지 너무 좋은 내용이라 가짜 같습니다.\" → 느낌만 서술하고 구체적 근거가 없어서 논증으로 인정받기 어렵습니다.",
      factcheck: "포털에서 '서울시 대중교통 무료화'를 검색해 서울시 공식 홈페이지(seoul.go.kr)와 연합뉴스·KBS 등 주요 언론의 기사가 있는지 확인하세요. 공식 정책 발표는 반드시 복수의 신뢰 언론에 동시 보도됩니다.",
      tip: "출처 이름이 공식처럼 보여도 실제 등록 언론사인지 확인하세요. 한국언론진흥재단 '빅카인즈(bigkinds.or.kr)'에서 언론사 진위를 검색할 수 있습니다."
    }
  },
  {
    id: 2,

// State
let idx = 0;
let verdict = null;
let scores = [];
let showClues = false;
let activeClue = null;

// Boot
renderNews();

function renderNews() {
  const news = NEWS_DATA[idx];

  // Progress dots
  document.getElementById('progress-dots').innerHTML = NEWS_DATA.map((_, i) =>
    `<div class="dot ${i < idx ? 'done' : i === idx ? 'current' : ''}"></div>`
  ).join('');

  document.getElementById('news-logo').textContent = news.logo;
  document.getElementById('news-source').textContent = news.source;
  document.getElementById('news-date').textContent = news.date;

  const diffEl = document.getElementById('diff-badge');
  diffEl.textContent = '난이도 ' + news.difficulty;
  diffEl.className = 'diff-badge ' + ({하:'diff-low',중:'diff-mid',상:'diff-high'}[news.difficulty]);

  document.getElementById('news-headline').textContent = news.headline;
  renderBody();

  showClues = false; activeClue = null;
  document.getElementById('clue-toggle-label').textContent = '단서 힌트 보기';
  document.getElementById('clue-pills').style.display = 'none';
  renderClues();

  showPhase('verdict');
  document.getElementById('reasoning-input').value = '';
  onReasoningInput();
}

function renderBody() {
  const news = NEWS_DATA[idx];
  const el = document.getElementById('news-body-text');
  if (activeClue === null) { el.textContent = news.body; return; }
  const clue = news.clues[activeClue];
  el.innerHTML = news.body.split(clue).map((p, i, arr) =>
    i < arr.length - 1 ? esc(p) + `<mark>${esc(clue)}</mark>` : esc(p)
  ).join('');
}

function renderClues() {
  document.getElementById('clue-pills').innerHTML = NEWS_DATA[idx].clues.map((c, i) =>
    `<button class="clue-pill ${activeClue===i?'active':''}" onclick="toggleClue(${i})">"${c}"</button>`
  ).join('');
}

function toggleClues() {
  showClues = !showClues;
  document.getElementById('clue-toggle-label').textContent = showClues ? '단서 숨기기' : '단서 힌트 보기';
  document.getElementById('clue-pills').style.display = showClues ? 'flex' : 'none';
  if (!showClues) { activeClue = null; renderBody(); }
}

function toggleClue(i) {
  activeClue = activeClue === i ? null : i;
  renderClues(); renderBody();
}

function showPhase(name) {
  ['verdict','reasoning','feedback'].forEach(p =>
    document.getElementById('phase-'+p).style.display = p===name ? 'block' : 'none'
  );
}

function selectVerdict(v) {
  verdict = v;
  const chip = document.getElementById('verdict-chip');
  chip.className = 'verdict-chip ' + v;
  chip.textContent = v === 'real' ? '✓' : '✗';
  document.getElementById('verdict-label-sm').textContent =
    v === 'real' ? '진짜 뉴스라고 판단했습니다' : '가짜 뉴스라고 판단했습니다';
  showPhase('reasoning');
  setTimeout(() => document.getElementById('reasoning-input').focus(), 100);
}

function onReasoningInput() {
  const len = document.getElementById('reasoning-input').value.trim().length;
  const cc = document.getElementById('char-count');
  const btn = document.getElementById('submit-btn');
  cc.textContent = document.getElementById('reasoning-input').value.length + '자';
  cc.className = len >= 20 ? 'ready' : '';
  btn.disabled = len < 20;
  btn.className = len >= 20 ? 'ready' : '';
}

function submitReasoning() {
  if (document.getElementById('reasoning-input').value.trim().length < 20) return;
  const news = NEWS_DATA[idx];
  const correct = (verdict === 'fake') === !news.isReal;
  scores.push({ id: news.id, correct });

  // Result banner
  const banner = document.getElementById('result-banner');
  banner.className = 'result-banner ' + (correct ? 'correct' : 'wrong');
  document.getElementById('result-icon').textContent = correct ? '🎯' : '💡';
  document.getElementById('result-title').textContent =
    (correct ? '정답!' : '오답') + ' — 이 기사는 ' + (news.isReal ? '진짜' : '가짜') + ' 뉴스입니다.';
  document.getElementById('result-explanation').textContent = news.explanation;

  // Fill feedback
  const fb = news.feedback;
  document.getElementById('fb-point').textContent = fb.point;
  document.getElementById('ex-good').textContent = fb.goodExample;
  document.getElementById('ex-bad').textContent  = fb.badExample;
  document.getElementById('fb-factcheck').textContent = fb.factcheck;
  document.getElementById('fb-tip').textContent = fb.tip;

  // Reset example tabs
  document.getElementById('ex-good').classList.remove('visible');
  document.getElementById('ex-bad').classList.remove('visible');
  document.getElementById('tab-good').className = 'ex-tab';
  document.getElementById('tab-bad').className  = 'ex-tab';

  // Next button text
  document.getElementById('next-btn').textContent = idx + 1 < NEWS_DATA.length
    ? `다음 기사 (${idx+2}/${NEWS_DATA.length}) →`
    : '결과 보기 →';

  showPhase('feedback');
  window.scrollTo({ top: document.getElementById('phase-feedback').offsetTop - 20, behavior: 'smooth' });
}

function showExample(type) {
  const goodEl  = document.getElementById('ex-good');
  const badEl   = document.getElementById('ex-bad');
  const tabGood = document.getElementById('tab-good');
  const tabBad  = document.getElementById('tab-bad');

  if (type === 'good') {
    const open = goodEl.classList.contains('visible');
    goodEl.classList.toggle('visible', !open);
    badEl.classList.remove('visible');
    tabGood.className = 'ex-tab ' + (!open ? 'good-active' : '');
    tabBad.className  = 'ex-tab';
  } else {
    const open = badEl.classList.contains('visible');
    badEl.classList.toggle('visible', !open);
    goodEl.classList.remove('visible');
    tabBad.className  = 'ex-tab ' + (!open ? 'bad-active' : '');
    tabGood.className = 'ex-tab';
  }
}

function nextNews() {
  if (idx + 1 >= NEWS_DATA.length) { showResult(); return; }
  idx++;
  renderNews();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showResult() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('result-screen').style.display = 'flex';

  const total = NEWS_DATA.length;
  const correct = scores.filter(s => s.correct).length;
  const pct = Math.round(correct / total * 100);
  const grade = pct >= 90 ? 'S' : pct >= 70 ? 'A' : pct >= 50 ? 'B' : 'C';
  const msgs = {
    S: '완벽한 탐정! 가짜뉴스를 꿰뚫는 눈이 있네요.',
    A: '우수한 분석력! 조금만 더 연습하면 완벽해요.',
    B: '좋은 시작이에요. 단서를 더 꼼꼼히 살펴봐요.',
    C: '미디어 리터러시, 함께 키워나가요!'
  };
  document.getElementById('grade-letter').textContent = grade;
  document.getElementById('score-text').textContent = `${pct}점 · ${correct}/${total} 정답`;
  document.getElementById('grade-msg').textContent = msgs[grade];
  document.getElementById('score-grid').innerHTML = scores.map(s => {
    const n = NEWS_DATA.find(x => x.id === s.id);
    return `<div class="score-item ${s.correct?'correct':'wrong'}">
      <div class="score-item-label">${s.correct?'정답':'오답'}</div>
      <div class="score-item-headline">${esc(n.headline.slice(0,30))}...</div>
    </div>`;
  }).join('');
}

function restart() {
  idx = 0; scores = []; verdict = null;
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderNews();
  window.scrollTo({ top: 0 });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
