<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초등용 커스텀 퀴즈 메이커</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f9fafb;
            --card: #ffffff;
            --text: #1f2937;
            --border: #e5e7eb;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        h1, h2 { text-align: center; color: var(--primary); }
        .hidden { display: none !important; }
        .form-group { margin-bottom: 20px; padding: 15px; border: 1px solid var(--border); border-radius: 8px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        input[type="text"], select {
            width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; font-size: 16px;
        }
        .options-group input { margin-bottom: 5px; }
        button {
            width: 100%; padding: 14px; background-color: var(--primary); color: white; border: none;
            border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover { background-color: var(--primary-hover); }
        .quiz-option {
            display: block; margin: 10px 0; padding: 14px; border: 1px solid var(--border);
            border-radius: 8px; cursor: pointer; background: var(--bg); font-size: 18px; text-align: center;
        }
        .quiz-option:hover { border-color: var(--primary); }
        .selected { background-color: #e0e7ff; border-color: var(--primary); font-weight: bold; }
        .result-box { text-align: center; padding: 20px; background: #eef2ff; border-radius: 12px; }
        .rank-tag { font-size: 24px; font-weight: bold; color: var(--primary); margin-top: 10px; }
        
        /* 단축 코드 전용 스타일 */
        .code-box {
            font-size: 32px; font-weight: bold; color: #db2777; letter-spacing: 4px;
            background: #fdf2f8; border: 2px dashed #f472b6; padding: 15px; border-radius: 8px;
            text-align: center; margin: 15px 0;
        }
        .student-zone {
            background: #f0fdf4; border: 1px solid #bbf7d0; padding: 20px; border-radius: 12px; margin-top: 20px;
        }
        .student-zone h3 { margin-top: 0; color: #16a34a; text-align: center; }
        .code-input {
            text-transform: uppercase; text-align: center; font-size: 24px; font-weight: bold; letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. 메인 홈 화면 (학생 입장 및 교사 출제) -->
    <div id="home-screen">
        <h1>나만의 퀴즈 메이커 📝</h1>
        
        <!-- 학생들을 위한 간편 입장 패널 -->
        <div class="student-zone">
            <h3>🎈 퀴즈 풀러 들어가기</h3>
            <p style="text-align: center; margin-bottom: 10px;">선생님이 알려준 <b>4자리 코드</b>를 입력하세요!</p>
            <input type="text" id="enter-code-input" class="code-input" placeholder="예: A7B9" maxlength="4">
            <button onclick="enterQuizByCode()" style="background-color: #16a34a;">퀴즈 방 입장하기</button>
        </div>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid var(--border);">
        <button onclick="startQuizCreation()" style="background-color: #6b7280;">선생님: 새로운 퀴즈 출제하기</button>
    </div>

    <!-- 2. 퀴즈 출제 화면 -->
    <div id="create-screen" class="hidden">
        <h2>퀴즈 출제하기 (총 10문항)</h2>
        <div id="question-forms"></div>
        <button onclick="generateQuizLink()">퀴즈 완성 및 단축 코드 발급</button>
    </div>

    <!-- 3. 링크 및 단축 코드 공유 화면 -->
    <div id="share-screen" class="hidden">
        <h2>퀴즈가 완성되었습니다! 🎉</h2>
        <p style="text-align: center;">아이들에게 아래의 <b>4자리 코드</b>를 알려주세요!</p>
        
        <!-- 패들릿 스타일의 단축 입장 코드 -->
        <div class="code-box" id="short-code-output">----</div>
        
        <p style="font-size:14px; color:#6b7280; text-align:center;">
            (팁: 아이들이 메인 화면에서 위 코드를 치면 바로 접속됩니다.)
        </p>
        <button onclick="copyCode()" style="background-color: #db2777;">코드 복사하기</button>
        <button onclick="location.href=location.pathname" style="margin-top: 10px; background:#6b7280;">메인 화면으로 가기</button>
    </div>

    <!-- 4. 퀴즈 푸는 화면 -->
    <div id="solve-screen" class="hidden">
        <h2 id="solve-title">퀴즈 도전!</h2>
        <div id="quiz-progress" style="text-align: right; font-weight: bold; color: var(--primary);"></div>
        <div id="quiz-display" style="margin: 20px 0;"></div>
        <button id="next-btn" onclick="nextQuestion()">다음 문제</button>
    </div>

    <!-- 5. 결과 및 등수 화면 -->
    <div id="result-screen" class="hidden">
        <h2>퀴즈 종료! 🏁</h2>
        <div class="result-box">
            <p style="font-size: 18px;">당신의 점수는?</p>
            <div id="final-score" style="font-size: 36px; font-weight: bold; color: #10b981;">0점</div>
            <div class="rank-tag" id="final-rank">현재 등수: 계산 중...</div>
        </div>
        <button onclick="location.href=location.pathname" style="margin-top: 20px; background:#6b7280;">메인으로 돌아가기</button>
    </div>
</div>

<script>
    const TOTAL_QUESTIONS = 10;
    let quizData = [];
    let currentSolveIndex = 0;
    let userAnswers = [];
    let currentQuizId = "";

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const encodedData = urlParams.get('quiz');
        currentQuizId = urlParams.get('id') || "default_quiz";

        // 기존처럼 다이렉트 긴 링크로 들어왔을 때도 호환 유지
        if (encodedData) {
            loadQuizFromEncoded(encodedData);
        }
    };

    function loadQuizFromEncoded(encodedData) {
        try {
            quizData = JSON.parse(decodeURIComponent(atob(encodedData)));
            if(quizData.length === TOTAL_QUESTIONS) {
                showScreen('solve-screen');
                startSolving();
            }
        } catch (e) {
            alert("올바르지 않은 퀴즈 링크입니다.");
            showScreen('home-screen');
        }
    }

    // 학생들이 4자리 코드를 입력해 입장하는 함수
    function enterQuizByCode() {
        const inputCode = document.getElementById('enter-code-input').value.trim().toUpperCase();
        if(!inputCode) return alert("코드를 입력해주세요!");

        // 로컬 스토리지에서 해당 코드의 데이터를 조회
        const savedData = localStorage.getItem(`quiz_code_${inputCode}`);
        if(!savedData) {
            alert("입력한 코드의 퀴즈방을 찾을 수 없습니다.\n코드를 다시 확인하거나 생성한 브라우저인지 확인해주세요.");
            return;
        }

        currentQuizId = 'q_' + inputCode;
        loadQuizFromEncoded(savedData);
    }

    function showScreen(screenId) {
        ['home-screen', 'create-screen', 'share-screen', 'solve-screen', 'result-screen'].forEach(id => {
            document.getElementById(id).classList.add('hidden');
        });
        document.getElementById(screenId).classList.remove('hidden');
    }

    // --- 퀴즈 출제 로직 ---
    function startQuizCreation() {
        showScreen('create-screen');
        const container = document.getElementById('question-forms');
        container.innerHTML = '';

        for (let i = 1; i <= TOTAL_QUESTIONS; i++) {
            const formHtml = `
                <div class="form-group" id="q-box-${i}">
                    <label>문항 ${i}. 문제 내용</label>
                    <input type="text" id="q-text-${i}" placeholder="문제를 입력하세요" required style="margin-bottom:10px;">
                    
                    <label>문제 유형</label>
                    <select id="q-type-${i}" onchange="toggleType(${i})">
                        <option value="OX">OX 퀴즈</option>
                        <option value="CHOICE">사지선다형</option>
                        <option value="SHORT">단답형</option>
                    </select>
                    
                    <div id="q-options-${i}" style="margin-top:10px;">
                        <label><input type="radio" name="ans-${i}" value="O" checked> O</label>
                        <label><input type="radio" name="ans-${i}" value="X"> X</label>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', formHtml);
        }
    }

    function toggleType(num) {
        const type = document.getElementById(`q-type-${num}`).value;
        const optionsDiv = document.getElementById(`q-options-${num}`);
        
        if (type === 'OX') {
            optionsDiv.innerHTML = `
                <label><input type="radio" name="ans-${num}" value="O" checked> O</label>
                <label><input type="radio" name="ans-${num}" value="X"> X</label>
            `;
        } else if (type === 'CHOICE') {
            optionsDiv.innerHTML = `
                <div class="options-group">
                    <input type="text" id="opt-${num}-1" placeholder="1번 보기" required>
                    <input type="text" id="opt-${num}-2" placeholder="2번 보기" required>
                    <input type="text" id="opt-${num}-3" placeholder="3번 보기" required>
                    <input type="text" id="opt-${num}-4" placeholder="4번 보기" required>
                </div>
                <label style="margin-top:5px;">정답 번호: 
                    <select id="ans-choice-${num}">
                        <option value="1">1번</option><option value="2">2번</option>
                        <option value="3">3번</option><option value="4">4번</option>
                    </select>
                </label>
            `;
        } else if (type === 'SHORT') {
            optionsDiv.innerHTML = `
                <input type="text" id="ans-short-${num}" placeholder="정답 단어를 입력하세요 (공백없이)" required>
            `;
        }
    }

    // 4자리 랜덤 대문자/숫자 코드 생성기 (아이들이 치기 쉬운 조합)
    function generateShortCode() {
        const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // 혼동을 주는 I, O, 0, 1 제외
        let code = "";
        for (let i = 0; i < 4; i++) {
            code += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return code;
    }

    function generateQuizLink() {
        const tempQuizData = [];
        for (let i = 1; i <= TOTAL_QUESTIONS; i++) {
            const questionText = document.getElementById(`q-text-${i}`).value.trim();
            if (!questionText) return alert(`${i}번 문제를 입력해주세요.`);

            const type = document.getElementById(`q-type-${i}`).value;
            let answer = "";
            let options = [];

            if (type === 'OX') {
                answer = document.querySelector(`input[name="ans-${i}"]:checked`).value;
            } else if (type === 'CHOICE') {
                for(let j=1; j<=4; j++) {
                    const optVal = document.getElementById(`opt-${i}-${j}`).value.trim();
                    if(!optVal) return alert(`${i}번 문제의 ${j}번 보기를 입력해주세요.`);
                    options.push(optVal);
                }
                answer = document.getElementById(`ans-choice-${i}`).value;
            } else if (type === 'SHORT') {
                answer = document.getElementById(`ans-short-${i}`).value.trim().replace(/\s+/g, '');
                if(!answer) return alert(`${i}번 문제의 정답을 입력해주세요.`);
            }

            tempQuizData.push({ type, question: questionText, options, answer });
        }

        const jsonStr = JSON.stringify(tempQuizData);
        const encoded = btoa(encodeURIComponent(jsonStr));
        
        // 4자리 고유 쇼트코드 생성 및 브라우저 저장
        const shortCode = generateShortCode();
        localStorage.setItem(`quiz_code_${shortCode}`, encoded);

        document.getElementById('short-code-output').innerText = shortCode;
        showScreen('share-screen');
    }

    function copyCode() {
        const codeText = document.getElementById('short-code-output').innerText;
        navigator.clipboard.writeText(codeText).then(() => {
            alert(`코드 [${codeText}]가 클립보드에 복사되었습니다!`);
        });
    }

    // --- 퀴즈 풀이 로직 ---
    function startSolving() {
        currentSolveIndex = 0;
        userAnswers = [];
        displayQuestion();
    }

    function displayQuestion() {
        const q = quizData[currentSolveIndex];
        document.getElementById('quiz-progress').innerText = `${currentSolveIndex + 1} / ${TOTAL_QUESTIONS}`;
        
        let html = `<p style="font-size:20px; font-weight:bold; text-align:center; margin-bottom:20px;">${q.question}</p>`;
        
        if (q.type === 'OX') {
            html += `
                <div class="quiz-option" onclick="selectAnswer('O')">⭕ O</div>
                <div class="quiz-option" onclick="selectAnswer('X')">❌ X</div>
            `;
        } else if (q.type === 'CHOICE') {
            q.options.forEach((opt, idx) => {
                html += `<div class="quiz-option" onclick="selectAnswer('${idx + 1}')"><b>${idx + 1}번</b> : ${opt}</div>`;
            });
        } else if (q.type === 'SHORT') {
            html += `<input type="text" id="short-user-ans" placeholder="여기에 정답을 입력하세요" style="text-align:center; margin-top:10px;">`;
        }

        document.getElementById('quiz-display').innerHTML = html;
        
        if(currentSolveIndex === TOTAL_QUESTIONS - 1) {
            document.getElementById('next-btn').innerText = "제출하고 내 등수 보기";
        } else {
            document.getElementById('next-btn').innerText = "다음 문제 ➡️";
        }
    }

    let tempSelectedAnswer = "";
    function selectAnswer(ans) {
        tempSelectedAnswer = ans;
        const options = document.querySelectorAll('.quiz-option');
        options.forEach(opt => opt.classList.remove('selected'));
        event.target.classList.add('selected');
    }

    function nextQuestion() {
        const q = quizData[currentSolveIndex];
        let finalAns = "";

        if (q.type === 'SHORT') {
            finalAns = document.getElementById('short-user-ans').value.trim().replace(/\s+/g, '');
            if(!finalAns) return alert("정답을 입력해주세요.");
        } else {
            if(!tempSelectedAnswer) return alert("정답을 골라주세요!");
            finalAns = tempSelectedAnswer;
        }

        userAnswers.push(finalAns);
        tempSelectedAnswer = ""; 

        if (currentSolveIndex < TOTAL_QUESTIONS - 1) {
            currentSolveIndex++;
            displayQuestion();
        } else {
            calculateResult();
        }
    }

    // --- 결과 및 등수 계산 ---
    function calculateResult() {
        let score = 0;
        quizData.forEach((q, idx) => {
            if (q.answer === userAnswers[idx]) {
                score += 10;
            }
        });

        document.getElementById('final-score').innerText = `${score}점`;

        const storageKey = `rankings_${currentQuizId}`;
        let rankings = JSON.parse(localStorage.getItem(storageKey)) || [];
        
        rankings.push(score);
        rankings.sort((a, b) => b - a);
        localStorage.setItem(storageKey, JSON.stringify(rankings));

        const myRank = rankings.indexOf(score) + 1;
        const totalParticipants = rankings.length;

        document.getElementById('final-rank').innerText = `현재 등수: ${totalParticipants}명 중 ${myRank}등`;
        showScreen('result-screen');
    }
</script>

</body>
</html>
