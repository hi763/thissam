<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>인공지능 용어 빙고</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --accent: #00e5ff;
    --accent2: #7c3aed;
    --accent3: #f59e0b;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --card-bg: #1e293b;
    --card-hover: #263347;
    --border: #2a3a52;
    --bingo-line: #00e5ff;
    --glow: 0 0 20px rgba(0,229,255,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    touch-action: pan-y;
  }

  /* BG Grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* HEADER */
  header {
    text-align: center;
    margin-bottom: 36px;
  }
  header .sub {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.8;
  }
  header h1 {
    font-size: clamp(26px, 6vw, 42px);
    font-weight: 900;
    color: var(--text);
    line-height: 1.1;
    letter-spacing: -1px;
  }
  header h1 span {
    color: var(--accent);
    text-shadow: 0 0 30px rgba(0,229,255,0.5);
  }
  header .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
    background: rgba(0,229,255,0.08);
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
  }

  /* TERM POOL */
  .section-label {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .section-label .count-badge {
    background: var(--accent);
    color: var(--bg);
    border-radius: 10px;
    padding: 1px 8px;
    font-size: 10px;
    font-weight: 700;
  }

  #term-pool {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    min-height: 80px;
    margin-bottom: 32px;
  }

  .term-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 13px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    cursor: grab;
    user-select: none;
    transition: all 0.15s ease;
    white-space: nowrap;
    position: relative;
    overflow: hidden;
  }
  .term-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,229,255,0.08), transparent);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .term-card:hover::before { opacity: 1; }
  .term-card:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,229,255,0.15);
  }
  .term-card:active { cursor: grabbing; transform: scale(0.97); }
  .term-card.dragging {
    opacity: 0.35;
    pointer-events: none;
  }
  .term-card.placed {
    opacity: 0.35;
    pointer-events: none;
    filter: grayscale(0.5);
  }

  /* BINGO BOARD */
  .board-section {
    margin-bottom: 28px;
  }
  #bingo-board-wrap {
    display: flex;
    justify-content: center;
  }
  #bingo-board {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    width: 100%;
    max-width: 520px;
    position: relative;
  }

  .bingo-cell {
    aspect-ratio: 1;
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(9px, 2vw, 13px);
    font-weight: 700;
    color: var(--text-muted);
    text-align: center;
    padding: 4px;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
    cursor: default;
  }
  .bingo-cell.drag-over {
    border-color: var(--accent);
    background: rgba(0,229,255,0.08);
    box-shadow: var(--glow);
  }
  .bingo-cell.filled {
    border: 2px solid var(--border);
    border-style: solid;
    background: var(--card-bg);
    color: var(--text);
    cursor: grab;
  }
  .bingo-cell.filled:hover {
    border-color: #f59e0b;
    color: var(--accent3);
    background: rgba(245,158,11,0.08);
  }
  .bingo-cell.filled:active { cursor: grabbing; }
  .bingo-cell.marked {
    background: rgba(0,229,255,0.12) !important;
    border-color: var(--accent) !important;
    color: var(--accent) !important;
    cursor: pointer;
    text-shadow: 0 0 10px rgba(0,229,255,0.5);
  }
  .bingo-cell.marked::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle, rgba(0,229,255,0.15), transparent 70%);
    pointer-events: none;
  }
  .bingo-cell.game-active.filled {
    cursor: pointer;
  }
  .bingo-cell.game-active.filled:hover {
    border-color: var(--accent);
    background: rgba(0,229,255,0.06);
    color: var(--text);
  }

  /* Bingo line canvas overlay */
  #bingo-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  /* BUTTONS */
  .btn-area {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 24px;
  }

  .btn {
    padding: 12px 32px;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
    letter-spacing: -0.3px;
  }

  #btn-make {
    background: linear-gradient(135deg, var(--accent2), #4f46e5);
    color: #fff;
    box-shadow: 0 4px 20px rgba(124,58,237,0.35);
  }
  #btn-make:disabled {
    background: var(--surface2);
    color: var(--text-muted);
    box-shadow: none;
    cursor: not-allowed;
    opacity: 0.6;
  }
  #btn-make:not(:disabled):hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(124,58,237,0.5);
  }
  #btn-make.start-mode {
    background: linear-gradient(135deg, #059669, #10b981);
    box-shadow: 0 4px 20px rgba(16,185,129,0.35);
  }
  #btn-make.start-mode:hover {
    box-shadow: 0 8px 28px rgba(16,185,129,0.5);
  }

  #btn-reset {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    display: none;
  }
  #btn-reset:hover {
    border-color: var(--accent3);
    color: var(--accent3);
    background: rgba(245,158,11,0.06);
  }
  #btn-reset.visible { display: block; }

  /* BINGO COUNT */
  .bingo-status {
    text-align: center;
    margin-top: 16px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
    min-height: 24px;
  }
  .bingo-status .bingo-count {
    color: var(--accent);
    font-weight: 700;
    font-size: 20px;
    display: inline-block;
  }
  .bingo-status .bingo-word {
    letter-spacing: 4px;
    color: var(--accent);
    font-size: 22px;
    font-weight: 700;
    text-shadow: var(--glow);
    animation: pulse 1s ease infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* DRAG GHOST */
  #drag-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    background: var(--accent);
    color: var(--bg);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: opacity 0.1s;
    box-shadow: 0 8px 30px rgba(0,229,255,0.4);
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent3);
    color: var(--bg);
    padding: 10px 24px;
    border-radius: 30px;
    font-weight: 700;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 9999;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* BINGO CELEBRATION */
  .bingo-flash {
    position: fixed;
    inset: 0;
    background: rgba(0,229,255,0.06);
    pointer-events: none;
    z-index: 999;
    opacity: 0;
    animation: none;
  }
  .bingo-flash.flash {
    animation: flashAnim 0.6s ease forwards;
  }
  @keyframes flashAnim {
    0% { opacity: 0; }
    30% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Filled cell content */
  .cell-text {
    line-height: 1.3;
    text-align: center;
    font-size: clamp(9px, 1.8vw, 13px);
    word-break: keep-all;
  }

  /* ── LAYOUT: portrait (default) = stacked ── */
  #main-layout {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  #pool-col {
    width: 100%;
    margin-bottom: 32px;
  }
  #board-col {
    width: 100%;
  }
  #term-pool {
    max-height: none;
    overflow-y: visible;
  }

  /* ── LAYOUT: landscape (width > height, narrow screen) ── */
  @media (orientation: landscape) and (max-height: 600px) {
    .wrapper {
      padding: 12px 16px 24px;
      max-width: 100%;
    }
    header {
      margin-bottom: 14px;
    }
    header h1 {
      font-size: clamp(18px, 4vw, 28px);
    }
    header .badge {
      font-size: 10px;
      padding: 3px 10px;
      margin-top: 6px;
    }
    header .sub {
      font-size: 9px;
      margin-bottom: 4px;
    }

    #main-layout {
      flex-direction: row;
      align-items: flex-start;
      gap: 16px;
    }
    #pool-col {
      width: 42%;
      flex-shrink: 0;
      margin-bottom: 0;
    }
    #board-col {
      flex: 1;
      min-width: 0;
    }
    #term-pool {
      max-height: calc(100dvh - 140px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      margin-bottom: 0;
    }
    #term-pool::-webkit-scrollbar { width: 4px; }
    #term-pool::-webkit-scrollbar-track { background: transparent; }
    #term-pool::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .board-section {
      margin-bottom: 10px;
    }
    #bingo-board {
      max-width: 100%;
    }
    .section-label {
      margin-bottom: 8px;
    }
    .bingo-status {
      margin-top: 8px;
    }
    .btn-area {
      margin-top: 10px;
    }
    .bingo-cell {
      border-radius: 6px;
      font-size: clamp(8px, 1.6vw, 11px);
    }
    .cell-text {
      font-size: clamp(8px, 1.4vw, 11px);
    }
    .term-card { font-size: 11px; padding: 5px 9px; }
    .btn { padding: 9px 20px; font-size: 13px; }
  }

  /* ── Small portrait phones ── */
  @media (max-width: 520px) and (orientation: portrait) {
    #bingo-board { gap: 4px; }
    .bingo-cell { border-radius: 7px; }
    .term-card { font-size: 12px; padding: 6px 10px; }
    .btn { padding: 11px 24px; font-size: 14px; }
  }
</style>
</head>
<body>

<div id="bingo-flash" class="bingo-flash"></div>
<div id="drag-ghost"></div>
<div id="toast" class="toast"></div>

<div class="wrapper">
  <header>
    <div class="sub">AI Terminology</div>
    <h1>인공지능 용어 <span>빙고</span></h1>
    <div class="badge">
      <span>▣</span>
      25개를 선택하여 빙고판을 완성하세요
    </div>
  </header>

  <!-- Main content: landscape = side-by-side, portrait = stacked -->
  <div id="main-layout">

    <!-- LEFT col (pool) -->
    <div id="pool-col">
      <div class="section-label">
        용어 카드
        <span class="count-badge" id="pool-count">30</span>
      </div>
      <div id="term-pool"></div>
    </div>

    <!-- RIGHT col (board) -->
    <div id="board-col">
      <div class="board-section">
        <div class="section-label">
          빙고판
          <span class="count-badge" id="board-count">0 / 25</span>
        </div>
        <div id="bingo-board-wrap">
          <div id="bingo-board">
            <canvas id="bingo-canvas"></canvas>
          </div>
        </div>
        <div class="bingo-status" id="bingo-status"></div>
      </div>

      <!-- Buttons -->
      <div class="btn-area">
        <button class="btn" id="btn-make" disabled>빙고판 만들기</button>
        <button class="btn" id="btn-reset">다시 하기</button>
      </div>
    </div>

  </div><!-- /main-layout -->
</div>

<script>
const TERMS = [
  '인공신경망','넷플릭스 추천','스팸메일 차단','데이터 라벨링','AI 헬스케어',
  '인공지능(AI)','챗GPT','할루시네이션','프롬프트','생성형 AI',
  '머신러닝','빅데이터','자율주행차','얼굴 인식','유튜브 알고리즘',
  'AI 스피커','데이터 수집','로봇 청소기','AI 번역기','챗봇',
  '스노우(SNOW)','AI 심판','딥러닝','음성 인식','스마트 워치',
  '네비게이션','무인 매장','AI 그림 작가','AI 윤리','가짜 뉴스'
];

const GRID = 5;
let board = Array(25).fill(null); // null or term string
let gameStarted = false;
let marked = new Set(); // cell indices
let bingoLines = []; // arrays of 5 indices

// Drag state
let dragSource = null; // {type:'pool'|'board', term, index?}
let touchDragInfo = null;

const poolEl = document.getElementById('term-pool');
const boardEl = document.getElementById('bingo-board');
const canvasEl = document.getElementById('bingo-canvas');
const btnMake = document.getElementById('btn-make');
const btnReset = document.getElementById('btn-reset');
const boardCountEl = document.getElementById('board-count');
const poolCountEl = document.getElementById('pool-count');
const statusEl = document.getElementById('bingo-status');
const ghost = document.getElementById('drag-ghost');
const flashEl = document.getElementById('bingo-flash');

// ── Prevent pull-to-refresh on mobile ──────────────────────────
let startY = 0;
document.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, {passive: true});
document.addEventListener('touchmove', e => {
  if (touchDragInfo) {
    e.preventDefault(); // block scroll while dragging
  }
}, {passive: false});

// ── Render pool ──────────────────────────────────────────────────
function renderPool() {
  poolEl.innerHTML = '';
  const placedTerms = new Set(board.filter(Boolean));
  let available = 0;
  TERMS.forEach(term => {
    const card = document.createElement('div');
    card.className = 'term-card' + (placedTerms.has(term) ? ' placed' : '');
    card.textContent = term;
    card.dataset.term = term;
    if (!placedTerms.has(term)) {
      if (!gameStarted) {
        card.draggable = true;
        addDragHandlers(card, 'pool', term);
        addTouchHandlers(card, 'pool', term);
      }
      available++;
    }
    poolEl.appendChild(card);
  });
  poolCountEl.textContent = available;
}

// ── Render board ──────────────────────────────────────────────────
function renderBoard() {
  // Keep canvas
  const cells = boardEl.querySelectorAll('.bingo-cell');
  cells.forEach(c => c.remove());

  board.forEach((term, i) => {
    const cell = document.createElement('div');
    cell.className = 'bingo-cell' + (term ? ' filled' : '');
    cell.dataset.index = i;

    if (term) {
      const span = document.createElement('span');
      span.className = 'cell-text';
      span.textContent = term;
      cell.appendChild(span);

      if (gameStarted) {
        cell.classList.add('game-active');
        if (marked.has(i)) cell.classList.add('marked');
        cell.addEventListener('click', () => toggleMark(i));
      } else {
        cell.draggable = true;
        addDragHandlers(cell, 'board', term, i);
        addTouchHandlers(cell, 'board', term, i);
      }
    } else {
      cell.textContent = '';
      if (!gameStarted) {
        addDropTarget(cell, i);
      }
    }

    boardEl.appendChild(cell);
  });

  const filled = board.filter(Boolean).length;
  boardCountEl.textContent = `${filled} / 25`;
  btnMake.disabled = filled === 0;

  // Redraw bingo lines if game started
  if (gameStarted) drawLines();
}

// ── Drag & Drop (Desktop HTML5) ───────────────────────────────────
function addDragHandlers(el, type, term, index) {
  el.addEventListener('dragstart', e => {
    if (gameStarted) return;
    dragSource = {type, term, index};
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', term);
    setTimeout(() => el.classList.add('dragging'), 0);
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    dragSource = null;
  });
}

function addDropTarget(cellEl, index) {
  cellEl.addEventListener('dragover', e => {
    if (gameStarted) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    cellEl.classList.add('drag-over');
  });
  cellEl.addEventListener('dragleave', () => cellEl.classList.remove('drag-over'));
  cellEl.addEventListener('drop', e => {
    if (gameStarted) return;
    e.preventDefault();
    cellEl.classList.remove('drag-over');
    if (!dragSource) return;
    const {type, term, index: srcIndex} = dragSource;
    // Place term into this cell
    if (type === 'board' && srcIndex !== undefined) board[srcIndex] = null;
    board[index] = term;
    renderPool();
    renderBoard();
  });
}

// Pool drop (board card → pool)
poolEl.addEventListener('dragover', e => {
  if (gameStarted) return;
  e.preventDefault();
});
poolEl.addEventListener('drop', e => {
  if (gameStarted) return;
  e.preventDefault();
  if (!dragSource) return;
  const {type, index} = dragSource;
  if (type === 'board' && index !== undefined) {
    board[index] = null;
    renderPool();
    renderBoard();
  }
});

// Filled board cell drop (swap)
boardEl.addEventListener('dragover', e => {
  if (gameStarted) return;
  const cell = e.target.closest('.bingo-cell.filled');
  if (cell) {
    e.preventDefault();
    cell.classList.add('drag-over');
  }
});
boardEl.addEventListener('dragleave', e => {
  const cell = e.target.closest('.bingo-cell');
  if (cell) cell.classList.remove('drag-over');
});
boardEl.addEventListener('drop', e => {
  if (gameStarted) return;
  const cell = e.target.closest('.bingo-cell.filled');
  if (!cell || !dragSource) return;
  e.preventDefault();
  cell.classList.remove('drag-over');
  const destIndex = parseInt(cell.dataset.index);
  const {type, term: srcTerm, index: srcIndex} = dragSource;
  const destTerm = board[destIndex];
  if (type === 'board' && srcIndex !== undefined) {
    board[srcIndex] = destTerm; // swap
  } else {
    // from pool: push dest back to pool
  }
  board[destIndex] = srcTerm;
  renderPool();
  renderBoard();
});

// ── Touch Drag & Drop ─────────────────────────────────────────────
function addTouchHandlers(el, type, term, index) {
  el.addEventListener('touchstart', e => {
    if (gameStarted) return;
    const touch = e.touches[0];
    touchDragInfo = {type, term, index, startX: touch.clientX, startY: touch.clientY, moved: false};
    ghost.textContent = term;
    ghost.style.left = touch.clientX + 'px';
    ghost.style.top = touch.clientY + 'px';
    // delay ghost show to distinguish tap
    touchDragInfo.showTimer = setTimeout(() => {
      ghost.style.opacity = '1';
      el.classList.add('dragging');
    }, 120);
  }, {passive: true});
}

document.addEventListener('touchmove', e => {
  if (!touchDragInfo) return;
  const touch = e.touches[0];
  ghost.style.left = touch.clientX + 'px';
  ghost.style.top = touch.clientY + 'px';
  touchDragInfo.moved = true;
  // Highlight drop target
  ghost.style.opacity = '0';
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  ghost.style.opacity = '1';
  // clear all drag-over
  document.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
  if (el) {
    const cell = el.closest('.bingo-cell');
    if (cell && !gameStarted) cell.classList.add('drag-over');
  }
}, {passive: false});

document.addEventListener('touchend', e => {
  if (!touchDragInfo) return;
  clearTimeout(touchDragInfo.showTimer);
  ghost.style.opacity = '0';
  document.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));

  const {type, term, index: srcIndex, moved} = touchDragInfo;
  touchDragInfo = null;

  // Find element under finger
  const touch = e.changedTouches[0];
  ghost.style.opacity = '0';
  const el = document.elementFromPoint(touch.clientX, touch.clientY);

  // Remove dragging class from all
  document.querySelectorAll('.dragging').forEach(c => c.classList.remove('dragging'));

  if (!moved) return; // was a tap, not drag

  if (!el) return;

  // Dropped on pool?
  if (el.closest('#term-pool')) {
    if (type === 'board' && srcIndex !== undefined) {
      board[srcIndex] = null;
      renderPool(); renderBoard();
    }
    return;
  }

  // Dropped on a board cell?
  const cell = el.closest('.bingo-cell');
  if (cell) {
    const destIndex = parseInt(cell.dataset.index);
    if (cell.classList.contains('filled')) {
      // Swap
      const destTerm = board[destIndex];
      if (type === 'board' && srcIndex !== undefined) board[srcIndex] = destTerm;
      board[destIndex] = term;
    } else {
      if (type === 'board' && srcIndex !== undefined) board[srcIndex] = null;
      board[destIndex] = term;
    }
    renderPool(); renderBoard();
  }
}, {passive: true});

// ── Mark cell ────────────────────────────────────────────────────
function toggleMark(index) {
  if (!gameStarted) return;
  if (!board[index]) return;
  if (marked.has(index)) {
    marked.delete(index);
  } else {
    marked.add(index);
  }
  renderBoard();
  checkBingo();
}

// ── Bingo check ──────────────────────────────────────────────────
function getBingoLines() {
  const lines = [];
  // Rows
  for (let r = 0; r < GRID; r++) {
    const line = [];
    for (let c = 0; c < GRID; c++) line.push(r*GRID+c);
    lines.push(line);
  }
  // Cols
  for (let c = 0; c < GRID; c++) {
    const line = [];
    for (let r = 0; r < GRID; r++) line.push(r*GRID+c);
    lines.push(line);
  }
  // Diag
  lines.push([0,6,12,18,24]);
  lines.push([4,8,12,16,20]);
  return lines;
}

function checkBingo() {
  const allLines = getBingoLines();
  const newBingo = allLines.filter(line => line.every(i => marked.has(i)));
  const newCount = newBingo.length;
  const oldCount = bingoLines.length;
  bingoLines = newBingo;

  if (newCount > oldCount) {
    flashEl.classList.remove('flash');
    void flashEl.offsetWidth;
    flashEl.classList.add('flash');
    showToast(`🎉 ${newCount}빙고!`);
  }

  // Update status
  if (newCount === 0) {
    statusEl.innerHTML = `<span style="color:var(--text-muted)">클릭하여 용어를 선택하세요</span>`;
  } else {
    const bingoWord = 'BINGO'.split('').map((ch, i) => `<span style="animation-delay:${i*0.1}s" class="bingo-word">${ch}</span>`).join('');
    statusEl.innerHTML = `<span class="bingo-count">${newCount}</span> ${bingoWord}`;
  }

  drawLines();
}

// ── Draw bingo lines on canvas ───────────────────────────────────
function drawLines() {
  const boardRect = boardEl.getBoundingClientRect();
  canvasEl.width = boardEl.offsetWidth;
  canvasEl.height = boardEl.offsetHeight;
  const ctx = canvasEl.getContext('2d');
  ctx.clearRect(0, 0, canvasEl.width, canvasEl.height);

  if (bingoLines.length === 0) return;

  const cells = boardEl.querySelectorAll('.bingo-cell');
  if (cells.length < 25) return;

  ctx.strokeStyle = 'rgba(0,229,255,0.75)';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.shadowColor = 'rgba(0,229,255,0.8)';
  ctx.shadowBlur = 12;

  bingoLines.forEach(line => {
    const first = cells[line[0]];
    const last = cells[line[line.length-1]];
    if (!first || !last) return;

    const fr = first.getBoundingClientRect();
    const lr = last.getBoundingClientRect();
    const bRect = boardEl.getBoundingClientRect();

    const x1 = fr.left - bRect.left + fr.width/2;
    const y1 = fr.top - bRect.top + fr.height/2;
    const x2 = lr.left - bRect.left + lr.width/2;
    const y2 = lr.top - bRect.top + lr.height/2;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  });
}

// ── Buttons ──────────────────────────────────────────────────────
btnMake.addEventListener('click', () => {
  if (gameStarted) return;
  const filled = board.filter(Boolean).length;

  if (btnMake.dataset.mode === 'start') {
    // Start game
    gameStarted = true;
    marked.clear();
    bingoLines = [];
    btnMake.textContent = '게임 진행 중';
    btnMake.disabled = true;
    btnMake.classList.remove('start-mode');
    statusEl.innerHTML = `<span style="color:var(--text-muted)">클릭하여 용어를 선택하세요</span>`;
    renderBoard();
    return;
  }

  if (filled < 25) {
    alert('용어 카드 25개를 채워주세요');
    return;
  }

  // Lock board
  btnMake.textContent = '게임 시작';
  btnMake.dataset.mode = 'start';
  btnMake.classList.add('start-mode');
  btnReset.classList.add('visible');
  renderPool();
  renderBoard();
});

btnReset.addEventListener('click', () => {
  board = Array(25).fill(null);
  gameStarted = false;
  marked.clear();
  bingoLines = [];
  btnMake.textContent = '빙고판 만들기';
  btnMake.dataset.mode = '';
  btnMake.disabled = true;
  btnMake.classList.remove('start-mode');
  btnReset.classList.remove('visible');
  statusEl.innerHTML = '';
  renderPool();
  renderBoard();
  // Clear canvas
  const ctx = canvasEl.getContext('2d');
  ctx.clearRect(0, 0, canvasEl.width, canvasEl.height);
});

// ── Toast ─────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Resize / orientation change → redraw lines ───────────────────
function onLayoutChange() {
  if (gameStarted) requestAnimationFrame(() => drawLines());
}
window.addEventListener('resize', onLayoutChange);
window.addEventListener('orientationchange', () => setTimeout(onLayoutChange, 200));

// ── Init ──────────────────────────────────────────────────────────
renderPool();
renderBoard();
</script>
</body>
</html>
